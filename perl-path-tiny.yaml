# yaml-language-server: $schema=https://raw.githubusercontent.com/wolfi-dev/melange/main/pkg/config/melange.schema.json
# Generated from https://raw.githubusercontent.com/alpinelinux/aports/refs/heads/master/main/perl-path-tiny/APKBUILD
package:
  name: perl-path-tiny
  version: "0.150"
  epoch: 0 # pure-Perl env trim + functional test
  description: File path utility
  copyright:
    - license: Apache-2.0
environment:
  contents:
    packages:
      - busybox
      - perl
pipeline:
  - uses: fetch
    with:
      expected-sha256: "ff20713d1a14d257af9c78209001f40dc177e4b9d1496115cbd8726d577946c7"
      uri: https://cpan.metacpan.org/authors/id/D/DA/DAGOLDEN/Path-Tiny-${{package.version}}.tar.gz
  - uses: perl/make
  - uses: autoconf/make
  - uses: autoconf/make-install
  - uses: perl/cleanup
  - uses: strip
subpackages:
  - name: perl-path-tiny-doc
    pipeline:
      - uses: split/manpages
    description: perl-path-tiny manpages
    test:
      pipeline:
        - uses: test/docs
test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: Path::Tiny
    - name: Verify Path::Tiny round-trips file content
      runs: |
        set -eu
        out=$(perl -MPath::Tiny -e '
          my $f = Path::Tiny->tempfile;
          $f->spew("hello path-tiny");
          print $f->slurp;
        ')
        echo "$out"
        echo "$out" | grep -Fq 'hello path-tiny'
update:
  enabled: true
  release-monitor:
    identifier: 11962
