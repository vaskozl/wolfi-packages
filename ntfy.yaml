# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: ntfy
  version: "2.1.0"
  epoch: 0
  description: Cloud-native push notifications for scripts, tools and apps
  copyright:
    - license: Apache-2.0 AND GPL-2.0-or-later
  dependencies:
    runtime:
      - ca-certificates
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/binwiederhier/ntfy
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./...
      output: ntfy
      ldflags: |
        -X ${{package.name}}/config.Version=${{package.version}}
        -X ${{package.name}}/config.CommitHash=${{vars.git_hash}}
        -X ${{package.name}}/config.BuildTime=${{vars.date}}

  - runs: |
      # Install systemd service file
      install -Dm644 ntfy.service "${{targets.destdir}}"/usr/lib/systemd/system/ntfy.service

      # Install example config
      install -Dm644 server.yml "${{targets.destdir}}"/etc/ntfy/server.yml.example

      # Create cache directory
      mkdir -p "${{targets.destdir}}"/var/cache/ntfy

      # Create data directory
      mkdir -p "${{targets.destdir}}"/var/lib/ntfy

  - uses: strip

subpackages:
  - name: ntfy-doc
    description: ntfy documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - busybox
  pipeline:
    - name: Verify ntfy binary exists
      runs: |
        stat /usr/bin/ntfy
    - name: Verify ntfy is executable
      runs: |
        test -x /usr/bin/ntfy
    - name: Check ntfy version
      runs: |
        ntfy --version 2>&1 || true
    - name: Check ntfy help
      runs: |
        ntfy --help 2>&1 | head -10
