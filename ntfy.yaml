# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: ntfy
  version: "2.20.0"
  epoch: 0
  description: Send push notifications to your phone or desktop
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - ca-certificates
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - sqlite-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/binwiederhier/ntfy
      tag: v${{package.version}}

  - runs: |
      # Build with CGO enabled for SQLite support
      export CGO_ENABLED=1
      export CGO_CFLAGS="-I/usr/include"
      export CGO_LDFLAGS="-L/usr/lib"
      go build -tags timetzdata -o ntfy .

  - runs: |
      # Install binary
      mkdir -p ${{targets.destdir}}/usr/bin
      cp ntfy ${{targets.destdir}}/usr/bin/

      # Install config directory
      mkdir -p ${{targets.destdir}}/etc/ntfy

      # Install systemd service directory
      mkdir -p ${{targets.destdir}}/usr/lib/systemd/system
      cp ntfy.service ${{targets.destdir}}/usr/lib/systemd/system/ 2>/dev/null || true

  - uses: strip

test:
  environment:
    contents:
      packages:
        - busybox
  pipeline:
    - name: Verify ntfy binary exists
      runs: |
        stat /usr/bin/ntfy
    - name: Verify ntfy is executable
      runs: |
        test -x /usr/bin/ntfy
    - name: Check ntfy version
      runs: |
        ntfy --version 2>&1 || true
