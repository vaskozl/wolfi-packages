# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: ntfy
  version: "2.22.0"
  epoch: 1 # go-package pin + functional tests
  description: Cloud-native push notifications for scripts, tools and apps
  copyright:
    - license: Apache-2.0 AND GPL-2.0-or-later
  dependencies:
    runtime:
      - ca-certificates
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/binwiederhier/ntfy
      tag: v${{package.version}}

  - runs: |
      # Create placeholder files for embedded server/docs and server/site directories.
      # These are normally generated by the web/docs build process; we skip the UI build
      # and provide minimal stubs so the go:embed directives succeed.
      mkdir -p server/docs server/site
      touch server/docs/index.html server/site/app.html

  - uses: go/build
    with:
      go-package: go-1.26
      packages: .
      output: ntfy
      ldflags: |
        -X main.version=${{package.version}}
        -X main.commit=release
        -X main.date=${{package.version}}

  - runs: |
      # Install default configuration files
      install -Dm644 client/client.yml "${{targets.destdir}}"/etc/ntfy/client.yml
      install -Dm644 server/server.yml "${{targets.destdir}}"/etc/ntfy/server.yml

      # Create cache and data directories
      mkdir -p "${{targets.destdir}}"/var/cache/ntfy
      mkdir -p "${{targets.destdir}}"/var/lib/ntfy

  - uses: strip

test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          ntfy
    - uses: test/help-check
      with:
        bins: |
          ntfy
    - name: Verify config files and functional invocation
      runs: |
        set -eu
        stat /etc/ntfy/client.yml
        stat /etc/ntfy/server.yml
        # Exercise the cobra subcommand tree — fails if a subcommand isn't wired up.
        ntfy publish --help >/dev/null
        ntfy serve --help >/dev/null
