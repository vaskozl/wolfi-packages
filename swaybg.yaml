package:
  name: swaybg
  version: "1.2.2"
  epoch: 0
  description: Wallpaper tool for Wayland compositors
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - build-base
      - cairo-dev
      - gdk-pixbuf-dev
      - libxkbcommon-dev
      - meson
      - scdoc
      - wayland-dev
      - wayland-protocols
      - wayland-protocols-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/swaywm/swaybg
      tag: v${{package.version}}
  - runs: |
      ln -s /usr/bin/scdoc /usr/local/bin/scdoc
  - uses: meson/configure
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: swaybg manpages
    test:
      pipeline:
        - uses: test/docs
  - name: ${{package.name}}-dbg
    pipeline:
      - uses: split/debug
    description: swaybg debug symbols
test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          swaybg
    - uses: test/help-check
      with:
        bins: |
          swaybg

update:
  enabled: true
  git: {}
