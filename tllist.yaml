package:
  name: tllist
  version: "1.1.0"
  epoch: 1 # add tests
  description: A C header file only implementation of a typed linked list
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - build-base
      - meson
pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/dnkl/tllist
      tag: ${{package.version}}
  - uses: meson/configure
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: "${{package.name}}-doc"
    pipeline:
      - uses: split/alldocs
    description: tllist manpages
    test:
      pipeline:
        - uses: test/docs
  - name: "${{package.name}}-dev"
    pipeline:
      - uses: split/dev
    description: tllist dev
    test:
      pipeline:
        - runs: |
            set -eu
            stat /usr/include/tllist.h
