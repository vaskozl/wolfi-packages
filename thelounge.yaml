package:
  name: thelounge
  version: "4.4.3"
  epoch: 2
  description: Web IRC client that you host on your own server
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - nodejs-${{vars.node-version}}
      - sqlite-libs
  resources:
    cpu: "4"
    memory: 8Gi

vars:
  node-version: 22

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - nodejs-${{vars.node-version}}
      - npm
      - python3
      - yarn

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/thelounge/thelounge
      tag: v${{package.version}}

  - runs: |
      export BROWSERSLIST_IGNORE_OLD_DATA=1
      export npm_config_build_from_source=1
      yarn install --frozen-lockfile

  - runs: |
      export NODE_ENV=production
      yarn build

  - runs: |
      # Install application files
      mkdir -p ${{targets.destdir}}/usr/share/webapps/thelounge

      # Entry point (repo root, NOT in dist/)
      cp index.js ${{targets.destdir}}/usr/share/webapps/thelounge/
      cp package.json ${{targets.destdir}}/usr/share/webapps/thelounge/

      # Compiled server code (tsc output)
      cp -r dist ${{targets.destdir}}/usr/share/webapps/thelounge/

      # Webpack-built client assets
      cp -r public ${{targets.destdir}}/usr/share/webapps/thelounge/

      # Additional runtime files
      mkdir -p ${{targets.destdir}}/usr/share/webapps/thelounge/client
      cp client/index.html.tpl ${{targets.destdir}}/usr/share/webapps/thelounge/client/
      cp .thelounge_home ${{targets.destdir}}/usr/share/webapps/thelounge/

      # Prune to production dependencies only, then copy
      yarn install --production --frozen-lockfile
      cp -r node_modules ${{targets.destdir}}/usr/share/webapps/thelounge/

      # Create wrapper script
      mkdir -p ${{targets.destdir}}/usr/bin
      printf '#!/bin/sh\nexec node /usr/share/webapps/thelounge/index.js "$@"\n' > ${{targets.destdir}}/usr/bin/thelounge
      chmod 755 ${{targets.destdir}}/usr/bin/thelounge

      # Set default home location
      mkdir -p ${{targets.destdir}}/var/lib/thelounge

  - uses: strip

subpackages:
  - name: thelounge-doc
    description: TheLounge documentation
    pipeline:
      - uses: split/manpages

test:
  environment:
    contents:
      packages:
        - busybox
        - nodejs-${{vars.node-version}}
  pipeline:
    - name: Verify entry point exists
      runs: |
        stat /usr/share/webapps/thelounge/index.js
    - name: Verify server code exists
      runs: |
        stat /usr/share/webapps/thelounge/dist/server/index.js
    - name: Verify client assets exist
      runs: |
        stat /usr/share/webapps/thelounge/public/
    - name: Verify node_modules exist
      runs: |
        stat /usr/share/webapps/thelounge/node_modules/
    - name: Verify wrapper is executable
      runs: |
        test -x /usr/bin/thelounge
    - name: Check node version is 22.x
      runs: |
        node --version | grep -E '^v22\.'
    - name: Check thelounge version
      runs: |
        thelounge version 2>&1 || true
