package:
  name: libliftoff
  version: "0.5.0"
  epoch: 1 # add ldd-check test, alphabetize env
  description: Lightweight KMS plane library
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - build-base
      - libdrm-dev
      - meson
pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/emersion/libliftoff
      tag: v${{package.version}}
  - runs: |
      meson \
        --prefix=/usr \
        . output
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
