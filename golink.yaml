# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: golink
  version: 1.0.0
  epoch: 1 # pin go-1.26 + go-package + functional test
  description: A private shortlink service for tailnets
  copyright:
    - license: BSD-3-Clause
environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tailscale/golink
      tag: v${{package.version}}
  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./cmd/golink
      output: golink
  - uses: strip
test:
  pipeline:
    - name: Verify golink usage output
      runs: |
        set -eu
        # Go flag package exits 2 on -h; ignore that and assert the usage banner is printed.
        golink -h 2>&1 | grep -F "Usage of golink"
