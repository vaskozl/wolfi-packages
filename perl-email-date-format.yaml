# yaml-language-server: $schema=https://raw.githubusercontent.com/wolfi-dev/melange/main/pkg/config/melange.schema.json
# Generated from https://raw.githubusercontent.com/alpinelinux/aports/refs/heads/master/main/perl-email-date-format/APKBUILD
package:
  name: perl-email-date-format
  version: "1.008"
  epoch: 1 # pure-Perl env trim + functional test
  description: produce RFC 2822 date strings
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
environment:
  contents:
    packages:
      - busybox
      - perl
pipeline:
  - uses: fetch
    with:
      expected-sha256: 432b7c83ff88749af128003f5257c573aec1a463418db90ed22843cbbc258b4f
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Email-Date-Format-${{package.version}}.tar.gz
  - uses: perl/make
  - uses: autoconf/make
  - uses: autoconf/make-install
  - uses: perl/cleanup
  - uses: strip
subpackages:
  - name: perl-email-date-format-doc
    pipeline:
      - uses: split/manpages
    description: perl-email-date-format manpages
    test:
      pipeline:
        - uses: test/docs
test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: Email::Date::Format
    - name: Verify format_date produces an RFC 2822 date string
      runs: |
        set -eu
        out=$(perl -MEmail::Date::Format=format_date -e 'print format_date(0)')
        echo "$out"
        # RFC 2822: e.g. "Thu, 1 Jan 1970 00:00:00 +0000"
        echo "$out" | grep -qE '^[A-Z][a-z]{2}, +[0-9]{1,2} +[A-Z][a-z]{2} +[0-9]{4} +[0-9]{2}:[0-9]{2}:[0-9]{2} +[-+][0-9]{4}$'
