# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
# Repackages Intel's upstream .deb releases rather than building from source.
# repository: https://github.com/intel/intel-graphics-compiler
package:
  name: intel-graphics-compiler
  version: "2.34.1"
  epoch: 0
  description: Intel Graphics Compiler for OpenCL (repackaged upstream binaries)
  copyright:
    - license: MIT
  target-architecture:
    - x86_64

environment:
  contents:
    packages:
      - binutils
      - busybox
      - ca-certificates-bundle
      - curl

pipeline:
  # Upstream ships each tag with assets named intel-igc-{core,opencl}-2_<version>+<build>_amd64.deb,
  # where <build> is an opaque build counter that varies per release. Discover the URLs via the
  # releases API so renovate only needs to bump package.version.
  - runs: |
      set -eu
      api="https://api.github.com/repos/intel/intel-graphics-compiler/releases/tags/v${{package.version}}"
      release=$(curl -sfL "$api")
      for asset in intel-igc-core-2 intel-igc-opencl-2; do
        url=$(printf '%s' "$release" \
          | busybox sed -nE "s#.*\"browser_download_url\":[[:space:]]*\"(https://[^\"]*${asset}_[^\"]*_amd64\\.deb)\".*#\\1#p" \
          | busybox head -n 1)
        [ -n "$url" ] || { echo "asset $asset not found in $api" >&2; exit 1; }
        curl -sfL -o "${asset}.deb" "$url"
      done

  - runs: |
      install -d "${{targets.destdir}}/usr/lib"
      for deb in intel-igc-core-2.deb intel-igc-opencl-2.deb; do
        ar p "$deb" data.tar.gz | tar xz -C "${{targets.destdir}}"
      done
      # Debian ships under /usr/local/lib — relocate to /usr/lib for Wolfi.
      mv "${{targets.destdir}}"/usr/local/lib/* "${{targets.destdir}}"/usr/lib/
      rmdir "${{targets.destdir}}"/usr/local/lib "${{targets.destdir}}"/usr/local

test:
  pipeline:
    - name: Verify IGC libraries
      runs: |
        test -e /usr/lib/libigc.so.2
        test -e /usr/lib/libiga64.so.2
        test -e /usr/lib/libigdfcl.so.2
        test -e /usr/lib/libopencl-clang2.so.16
