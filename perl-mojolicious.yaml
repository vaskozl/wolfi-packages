# Generated from https://raw.githubusercontent.com/alpinelinux/aports/refs/heads/master/community/perl-mojolicious/APKBUILD
# repository: https://github.com/mojolicious/mojo
package:
  name: perl-mojolicious
  version: "9.42"
  epoch: 1 # pure-Perl env trim + functional test
  description: Real-time web framework
  copyright:
    - license: Artistic-2.0
environment:
  contents:
    packages:
      - busybox
      - perl
pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/S/SR/SRI/Mojolicious-${{package.version}}.tar.gz
  - uses: perl/make
  - uses: autoconf/make
  - uses: autoconf/make-install
  - uses: perl/cleanup
  - uses: strip
subpackages:
  - name: perl-mojolicious-doc
    pipeline:
      - uses: split/manpages
    description: perl-mojolicious manpages
    test:
      pipeline:
        - uses: test/docs
test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: "Mojo Mojo::URL Mojo::UserAgent Mojolicious"
    - name: Verify Mojo::URL parses and round-trips a URL correctly
      runs: |
        set -eu
        out=$(perl -MMojo::URL -e '
          my $url = Mojo::URL->new("https://example.com/path?foo=bar");
          print $url->host, "|", $url->path, "|", $url->query->param("foo");
        ')
        echo "$out"
        echo "$out" | grep -qF 'example.com|/path|bar'
