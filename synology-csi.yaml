# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: synology-csi
  version: "1.3.0"
  epoch: 0 # drop build-base, pin go-1.26, add go-package, fix test
  description: The official Container Storage Interface driver for Synology NAS
  copyright:
    - license: Apache-2.0-only
environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/SynologyOpenSource/synology-csi
      tag: v${{package.version}}
  - uses: go/build
    with:
      go-package: go-1.26
      output: synology-csi-driver
      packages: .
  - uses: go/build
    with:
      go-package: go-1.26
      output: synologycli
      packages: ./synocli
  - uses: strip
test:
  pipeline:
    - name: Verify synology-csi installation
      runs: |
        set -eu
        synology-csi-driver --help
update:
  enabled: true
  github:
    identifier: SynologyOpenSource/synology-csi
    strip-prefix: v
