# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: libclc
  # datasource: wolfi-base packageName: llvm-22
  version: "22.1.8"
  epoch: 0 # rebuild for spirv-llvm-translator 22.1.3
  description: OpenCL C library implementation for the LLVM toolchain (LLVM 22)
  copyright:
    - license: Apache-2.0 WITH LLVM-exception
  target-architecture:
    - x86_64
environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - clang-22
      - cmake
      - llvm-22-dev
      - python-3.13
      - samurai
      - spirv-llvm-translator
pipeline:
  - uses: fetch
    with:
      uri: https://github.com/llvm/llvm-project/releases/download/llvmorg-${{package.version}}/llvm-project-${{package.version}}.src.tar.xz
      expected-sha256: 922f1817a0df7b1489272d18134ee0087a8b068828f87ac63b9861b1a9965888
  - runs: |
      set -eu
      cmake -B build -G Ninja -S libclc \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DLIBCLC_TARGETS_TO_BUILD="spirv-mesa3d-;spirv64-mesa3d-" \
        -DLLVM_DIR=/usr/lib/llvm-22/lib/cmake/llvm \
        -DLLVM_SPIRV=/usr/bin/llvm-spirv
      cmake --build build
      DESTDIR="${{targets.destdir}}" cmake --install build
test:
  pipeline:
    - uses: test/pkgconf
    - name: pkgconf resolves libclc and SPIR-V libraries are present
      runs: |
        set -eu
        pkgconf --exists libclc
        pkgconf --modversion libclc
        test -f /usr/share/clc/spirv-mesa3d-.spv
        test -f /usr/share/clc/spirv64-mesa3d-.spv
update:
  enabled: true
  release-monitor:
    identifier: 376264
