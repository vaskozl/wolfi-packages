# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
# Generated from https://raw.githubusercontent.com/alpinelinux/aports/refs/heads/master/community/catatonit/APKBUILD
package:
  name: catatonit
  version: 0.2.1
  epoch: 1 # build-env trim + functional test
  description: Container init that is so simple it's effectively brain-dead
  copyright:
    - license: GPL-2.0-or-later
environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - libtool
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openSUSE/catatonit
      tag: v${{package.version}}
  - uses: autoconf/configure
  - uses: autoconf/make
  - uses: autoconf/make-install
  - uses: strip
test:
  pipeline:
    - name: Verify catatonit can wrap a child process
      runs: |
        set -eu
        # catatonit -V exits 0 and prints version; don't assert exact format.
        catatonit -V
        # Verify catatonit spawns a child and forwards its stdout.
        output=$(catatonit -- echo "hello from catatonit")
        echo "$output" | grep -F "hello from catatonit"
        # Verify catatonit forwards a successful child exit code.
        catatonit -- true
        # Verify catatonit forwards a non-zero child exit code.
        ! catatonit -- false
