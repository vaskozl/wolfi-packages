package:
  name: cloudflared
  version: "2026.6.1"
  epoch: 0
  description: Cloudflare Tunnel client
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi
environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - wolfi-baselayout
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cloudflare/cloudflared
      tag: ${{package.version}}
      expected-commit: 0e84636de9450d9e73c1e28932ed2bd62cb33e10
  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        golang.org/x/crypto@v0.52.0
  - uses: go/build
    with:
      packages: ./cmd/cloudflared
      output: cloudflared
      go-package: go-1.26
      ldflags: -X "main.Version=${{package.version}}"
update:
  enabled: true
  github:
    identifier: cloudflare/cloudflared
test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/ver-check
      with:
        bins: cloudflared
    - uses: test/help-check
      with:
        bins: cloudflared
    - name: "tunnel subcommand parses"
      runs: |
        set -eu
        cloudflared tunnel --help
