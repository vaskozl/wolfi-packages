# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
# Generated from https://raw.githubusercontent.com/alpinelinux/aports/refs/heads/master/testing/kubeconform/APKBUILD
package:
  name: kubeconform
  version: 0.8.0
  epoch: 0
  description: A FAST Kubernetes manifests validator, with support for Custom Resources!
  copyright:
    - license: Apache-2.0
environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/yannh/kubeconform
      tag: v${{package.version}}
  - uses: go/build
    with:
      packages: ./cmd/kubeconform
      output: kubeconform
  - uses: strip
test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify kubeconform
      runs: |
        set -eu
        kubeconform -v
        kubeconform -h
        cat <<'EOF' | kubeconform -
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: test
        data:
          key: value
        EOF

update:
  enabled: true
  git: {}
