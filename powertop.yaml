# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: powertop
  version: "2.15"
  epoch: 1 # add service subpackage
  description: Power consumption monitor and tuner
  copyright:
    - license: GPL-2.0-only
environment:
  contents:
    packages:
      - autoconf
      - autoconf-archive
      - automake
      - build-base
      - gettext-dev
      - libnl3-dev
      - libtool
      - linux-headers
      - ncurses-dev
      - pciutils-dev
      - pciutils-libs
      - pkgconf-dev
      - xz-dev
      - zlib-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/fenrus75/powertop
      tag: v${{package.version}}
  - uses: patch
    with:
      patches: powertop-2.15-gettext.patch powertop-libtool.patch
  - runs: autoreconf -fi
  - uses: autoconf/configure
    with:
      opts: --disable-nls
  - uses: autoconf/make
  - uses: autoconf/make-install
  - runs: |
      install -d "${{targets.destdir}}/usr/bin"
      mv "${{targets.destdir}}/usr/sbin/powertop" "${{targets.destdir}}/usr/bin/powertop"
      rmdir "${{targets.destdir}}/usr/sbin"
  - uses: strip
subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: powertop manpages
  - name: ${{package.name}}-bash-completion
    pipeline:
      - runs: |
          install -d "${{targets.subpkgdir}}/usr/share/bash-completion/completions"
          mv "${{targets.destdir}}/usr/share/bash-completion/completions/powertop" \
             "${{targets.subpkgdir}}/usr/share/bash-completion/completions/powertop"
    description: powertop bash completion
  - name: ${{package.name}}-service
    description: systemd service that applies powertop --auto-tune on boot
    dependencies:
      runtime:
        - powertop
    pipeline:
      - runs: |
          set -eu
          install -Dm644 powertop.service \
            "${{targets.subpkgdir}}/usr/lib/systemd/system/powertop.service"
          sed -i 's|/usr/sbin/powertop|/usr/bin/powertop|' \
            "${{targets.subpkgdir}}/usr/lib/systemd/system/powertop.service"
    test:
      pipeline:
        - uses: test/verify-service
        - runs: |
            set -eu
            grep -F 'ExecStart=/usr/bin/powertop --auto-tune' \
              /usr/lib/systemd/system/powertop.service
test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          powertop
    - uses: test/help-check
      with:
        bins: |
          powertop
    - name: powertop --help mentions usage
      runs: |
        set -eu
        powertop --help 2>&1 | grep -F -e "Usage:"
