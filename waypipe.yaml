package:
  name: waypipe
  version: "0.11.0"
  epoch: 1 # rebuild for mesa-full 26.1.1 libgbm.so dev symlink (-lgbm)
  description: Proxy for Wayland clients
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - build-base
      - cargo-auditable
      - clang
      - ffmpeg-dev
      - libclang-cpp
      - lz4-dev
      - mesa-dev
      - mesa-gbm
      - meson
      - rust
      - rust-bindgen
      - scdoc
      - shaderc
      - vulkan-headers-dev
      - vulkan-loader-dev
      - wayland-dev
      - wayland-protocols
      - wayland-protocols-dev
      - zstd-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/mstoeckl/waypipe
      tag: v${{package.version}}
  - runs: |
      ln -s /usr/bin/scdoc /usr/local/bin/scdoc
  - runs: |
      # waypipe's compile_wrapper.sh invokes `cargo build --frozen`, which
      # implies --offline; pre-fetch the registry so the offline build works.
      cargo fetch --locked
  - uses: meson/configure
    with:
      opts: -Dwerror=false -Db_ndebug=true
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: waypipe manpages
    test:
      pipeline:
        - uses: test/docs
  - name: ${{package.name}}-dbg
    pipeline:
      - uses: split/debug
    description: waypipe debug symbols
test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          waypipe
    - uses: test/help-check
      with:
        bins: |
          waypipe
    - runs: |
        set -eu
        # The `client` subcommand itself does not accept `--help` (clap rejects
        # it with "unexpected argument"). Verify subcommand routing and the
        # --socket option via the top-level help output instead.
        waypipe --help | grep -qi '^  client'
        waypipe --help | grep -qi -- '--socket'
update:
  enabled: true
  git: {}
