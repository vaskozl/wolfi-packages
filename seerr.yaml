package:
  name: seerr
  version: "3.3.0"
  description: "Open-source media request and discovery manager for Jellyfin, Plex, and Emby."
  epoch: 0 # fix aarch64 native prebuild deletion (linux-arm* wildcard was also matching linux-arm64)
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - jq
      - node-gyp
      - nodejs-${{vars.node-version}}
      - pnpm
      - python3
vars:
  node-version: 25
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/seerr-team/seerr
      tag: v${{package.version}}
  - uses: patch
    with:
      patches: npm.patch
  - name: pnpm-build
    pipeline:
      - runs: |
          set -eu
          echo "{\"commitTag\": \"${{package.version}}\"}" > committag.json
          export NEXT_TELEMETRY_DISABLED=1
          export CYPRESS_INSTALL_BINARY=0
          export SHARP_IGNORE_GLOBAL_LIBVIPS=1
          export NODE_OPTIONS=--max-old-space-size=6144
          export npm_config_libc=glibc
          export npm_config_os=linux
          pnpm update jwa
          pnpm install
          pnpm build
          pnpm prune --prod --ignore-scripts
          rm -rf .next/cache
          echo "node_modules before scrub: $(du -sh node_modules | cut -f1)"
          # Scrub non-target platform native binaries so musl/darwin/win32 .so
          # files are never packaged and SCA cannot emit foreign so: deps.
          # Also catches hermesc-style bundled compiler dirs (win64-bin, osx-bin)
          # that don't use the standard win32/darwin naming scheme.
          find node_modules -type d \( \
              -name '*linuxmusl*' \
              -o -name '*-musl*' \
              -o -name '*darwin*' \
              -o -name '*win32*' \
              -o -name '*win64*' \
              -o -name '*win-bin*' \
              -o -name '*osx-bin*' \
              -o -name '*freebsd*' \
            \) -prune -exec rm -rf {} +
          # bcrypt ships glibc + musl prebuilds *side by side* under one
          # libc-agnostic dir (prebuilds/linux-x64/bcrypt.{glibc,musl}.node),
          # so the dir-name pattern above misses the musl variant. Drop it
          # by file suffix.
          find node_modules -type f -name '*.musl.node' -delete
          echo "node_modules after platform-binary scrub: $(du -sh node_modules | cut -f1)"
          # react-native and the @react-native/* ecosystem are transitive deps
          # that survive pnpm prune --prod because an upstream package
          # incorrectly lists them under dependencies (not devDependencies).
          # Seerr is a Next.js/Node server with no React Native or Hermes
          # runtime need. Drop main package AND all @react-native/* scoped
          # packages from the pnpm virtual store (.pnpm uses @scope+pkg naming).
          find node_modules/.pnpm -maxdepth 1 -type d \
            \( -name 'react-native@*' -o -name '@react-native+*' \) \
            -exec rm -rf {} + 2>/dev/null || true
          rm -rf node_modules/react-native node_modules/@react-native
          echo "node_modules after react-native removal: $(du -sh node_modules | cut -f1)"
          # Prune development-only files never needed at runtime:
          #  - .js.map: source maps for debuggers; large text, not used by Node
          #  - .d.ts:   TypeScript declarations; only needed for TS compilation
          #  - .js.flow: Flow type annotations; only needed for Flow type-checking
          #  - .ts (non-.d.ts): TypeScript source files shipped by some packages
          find node_modules -type f \
            \( -name '*.js.map' -o -name '*.d.ts' -o -name '*.js.flow' \) \
            -delete 2>/dev/null || true
          # Prune test-only and docs dirs that npm packages often ship but are
          # never needed at runtime. Safe to drop after pnpm prune --prod.
          find node_modules -type d \
            \( -name '__tests__' -o -name '__mocks__' \
            -o -name 'test' -o -name 'tests' \
            -o -name 'spec' -o -name 'specs' \) \
            -prune -exec rm -rf {} + 2>/dev/null || true
          echo "node_modules after dev-file and test-dir pruning: $(du -sh node_modules | cut -f1)"
          # Prune architecture-foreign prebuilds. Many native modules ship
          # precompiled binaries for all linux arches; only keep the one
          # matching the current build target.
          case "${{build.arch}}" in
            x86_64)
              find node_modules -path '*/prebuilds/linux-arm*' -type d \
                -prune -exec rm -rf {} + 2>/dev/null || true
              find node_modules -path '*/prebuilds/linux-ia32' -type d \
                -prune -exec rm -rf {} + 2>/dev/null || true
              ;;
            aarch64)
              # Drop foreign-arch prebuilds; linux-arm64 is native and must be kept.
              find node_modules -type d \
                \( -path '*/prebuilds/linux-x64' \
                  -o -path '*/prebuilds/linux-ia32' \
                  -o -path '*/prebuilds/linux-arm' \
                  -o -path '*/prebuilds/linux-armv7' \
                  -o -path '*/prebuilds/linux-armhf' \
                \) -prune -exec rm -rf {} + 2>/dev/null || true
              ;;
          esac
          echo "node_modules final size: $(du -sh node_modules | cut -f1)"
  - runs: |
      set -eu
      mkdir -p ${{targets.contextdir}}/usr/bin \
      ${{targets.contextdir}}/usr/lib/seerr \
      ${{targets.contextdir}}/usr/local

      cp -a .next ${{targets.contextdir}}/usr/lib/seerr/
      cp -a dist ${{targets.contextdir}}/usr/lib/seerr/
      cp -a node_modules ${{targets.contextdir}}/usr/lib/seerr/
      cp -a public ${{targets.contextdir}}/usr/lib/seerr/
      cp package.json ${{targets.contextdir}}/usr/lib/seerr/
      cp seerr-api.yml ${{targets.contextdir}}/usr/lib/seerr/
      cp package.json ${{targets.contextdir}}/usr/lib/seerr/
      cp next.config.ts ${{targets.contextdir}}/usr/lib/seerr/

      # Fix paths
      find "${{targets.contextdir}}/usr/lib/seerr/.next" -type f -print0 | xargs -0 sed -i "s^${{package.srcdir}}^/usr/lib/seerr^g"

      printf '#!/bin/sh\nexec node /usr/lib/seerr/dist/index.js "$@"\n' > ${{targets.contextdir}}/usr/bin/seerr
      chmod 755 ${{targets.contextdir}}/usr/bin/seerr
test:
  environment:
    contents:
      packages:
        - nodejs-${{vars.node-version}}
  pipeline:
    - runs: |
        set -eu
        test -x /usr/bin/seerr
        test -f /usr/lib/seerr/dist/index.js
update:
  enabled: true
  github:
    identifier: seerr-team/seerr
    strip-prefix: v
