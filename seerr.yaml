package:
  name: seerr
  version: 3.2.0
  description: "Open-source media request and discovery manager for Jellyfin, Plex, and Emby."
  epoch: 8 # prune foreign-arch and win64-bin from node_modules to reduce apk size
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - jq
      - node-gyp
      - nodejs-${{vars.node-version}}
      - pnpm
      - python3
vars:
  node-version: 25
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/seerr-team/seerr
      tag: v${{package.version}}
  - uses: patch
    with:
      patches: npm.patch
  - name: pnpm-build
    pipeline:
      - runs: |
          set -eu
          echo "{\"commitTag\": \"${{package.version}}\"}" > committag.json
          export NEXT_TELEMETRY_DISABLED=1
          export CYPRESS_INSTALL_BINARY=0
          export SHARP_IGNORE_GLOBAL_LIBVIPS=1
          export NODE_OPTIONS=--max-old-space-size=6144
          export npm_config_libc=glibc
          export npm_config_os=linux
          pnpm update jwa
          pnpm install
          pnpm build
          pnpm prune --prod --ignore-scripts
          rm -rf .next/cache
          # Scrub non-target platform native binaries so musl/darwin/win32 .so
          # files are never packaged and SCA cannot emit foreign so: deps.
          # Also catches hermesc-style bundled compiler dirs (win64-bin, osx-bin)
          # that don't use the standard win32/darwin naming scheme.
          find node_modules -type d \( \
              -name '*linuxmusl*' \
              -o -name '*-musl*' \
              -o -name '*darwin*' \
              -o -name '*win32*' \
              -o -name '*win64*' \
              -o -name '*win-bin*' \
              -o -name '*osx-bin*' \
              -o -name '*freebsd*' \
            \) -prune -exec rm -rf {} +
          # bcrypt ships glibc + musl prebuilds *side by side* under one
          # libc-agnostic dir (prebuilds/linux-x64/bcrypt.{glibc,musl}.node),
          # so the dir-name pattern above misses the musl variant. Drop it
          # by file suffix.
          find node_modules -type f -name '*.musl.node' -delete
          # react-native is a transitive dep that survives pnpm prune --prod
          # because it is incorrectly listed under dependencies (not
          # devDependencies) by an upstream package. Seerr is a Next.js/Node
          # server and has no runtime need for React Native or its bundled
          # Hermes compiler (hermesc). Drop it to shed ~100-200 MB.
          find node_modules/.pnpm -maxdepth 1 -type d -name 'react-native@*' \
            -exec rm -rf {} + 2>/dev/null || true
          rm -rf node_modules/react-native
          # Prune architecture-foreign prebuilds. Many native modules ship
          # precompiled binaries for all linux arches; only keep the one
          # matching the current build target.
          case "${{build.arch}}" in
            x86_64)
              find node_modules -path '*/prebuilds/linux-arm*' -type d \
                -prune -exec rm -rf {} + 2>/dev/null || true
              find node_modules -path '*/prebuilds/linux-ia32' -type d \
                -prune -exec rm -rf {} + 2>/dev/null || true
              ;;
            aarch64)
              find node_modules -path '*/prebuilds/linux-x64' -type d \
                -prune -exec rm -rf {} + 2>/dev/null || true
              find node_modules -path '*/prebuilds/linux-ia32' -type d \
                -prune -exec rm -rf {} + 2>/dev/null || true
              find node_modules -path '*/prebuilds/linux-arm' -type d \
                -prune -exec rm -rf {} + 2>/dev/null || true
              ;;
          esac

  - runs: |
      set -eu
      mkdir -p ${{targets.contextdir}}/usr/bin \
      ${{targets.contextdir}}/usr/lib/seerr \
      ${{targets.contextdir}}/usr/local

      cp -a .next ${{targets.contextdir}}/usr/lib/seerr/
      cp -a dist ${{targets.contextdir}}/usr/lib/seerr/
      cp -a node_modules ${{targets.contextdir}}/usr/lib/seerr/
      cp -a public ${{targets.contextdir}}/usr/lib/seerr/
      cp package.json ${{targets.contextdir}}/usr/lib/seerr/
      cp seerr-api.yml ${{targets.contextdir}}/usr/lib/seerr/
      cp package.json ${{targets.contextdir}}/usr/lib/seerr/
      cp next.config.js ${{targets.contextdir}}/usr/lib/seerr/

      # Fix paths
      find "${{targets.contextdir}}/usr/lib/seerr/.next" -type f -print0 | xargs -0 sed -i "s^${{package.srcdir}}^/usr/lib/seerr^g"

      printf '#!/bin/sh\nexec node /usr/lib/seerr/dist/index.js "$@"\n' > ${{targets.contextdir}}/usr/bin/seerr
      chmod 755 ${{targets.contextdir}}/usr/bin/seerr

test:
  environment:
    contents:
      packages:
        - nodejs-${{vars.node-version}}
  pipeline:
    - runs: |
        set -eu
        test -x /usr/bin/seerr
        test -f /usr/lib/seerr/dist/index.js
