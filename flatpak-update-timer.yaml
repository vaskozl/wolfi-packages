# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: flatpak-update-timer
  version: "1"
  epoch: 0
  description: systemd timer that updates flatpaks daily and prunes unused runtimes
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - flatpak
environment:
  contents:
    packages:
      - busybox
pipeline:
  - runs: |
      set -eu
      install -Dm644 /dev/stdin "${{targets.destdir}}/usr/lib/systemd/system/flatpak-update.service" <<'UNIT'
      [Unit]
      Description=Update Flatpaks and prune unused runtimes
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/flatpak update --system --noninteractive --assumeyes
      ExecStart=/usr/bin/flatpak uninstall --system --unused --noninteractive --assumeyes
      UNIT
      install -Dm644 /dev/stdin "${{targets.destdir}}/usr/lib/systemd/system/flatpak-update.timer" <<'UNIT'
      [Unit]
      Description=Daily Flatpak update + cleanup

      [Timer]
      OnCalendar=daily
      Persistent=true
      RandomizedDelaySec=30m

      [Install]
      WantedBy=timers.target
      UNIT
      install -Dm644 /dev/stdin "${{targets.destdir}}/usr/lib/systemd/system-preset/80-flatpak-update.preset" <<'PRESET'
      enable flatpak-update.timer
      PRESET
test:
  pipeline:
    - uses: test/verify-service
    - runs: |
        set -eu
        stat /usr/lib/systemd/system/flatpak-update.service
        stat /usr/lib/systemd/system/flatpak-update.timer
        stat /usr/lib/systemd/system-preset/80-flatpak-update.preset
        grep -F 'ExecStart=/usr/bin/flatpak update' /usr/lib/systemd/system/flatpak-update.service
        grep -F 'OnCalendar=daily' /usr/lib/systemd/system/flatpak-update.timer
