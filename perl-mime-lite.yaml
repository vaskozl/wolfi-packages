# yaml-language-server: $schema=https://raw.githubusercontent.com/wolfi-dev/melange/main/pkg/config/melange.schema.json
# Generated from https://raw.githubusercontent.com/alpinelinux/aports/refs/heads/master/main/perl-mime-lite/APKBUILD
package:
  name: perl-mime-lite
  version: "3.038"
  epoch: 1 # add perl-email-date-format runtime dep
  description: low-calorie MIME generator
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl-email-date-format
environment:
  contents:
    packages:
      - busybox
      - perl
pipeline:
  - uses: fetch
    with:
      expected-sha256: 06eb47db74d594d2256cf4794f2c259e9f3f54b9f61b900544e6e1d879e244f5
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/MIME-Lite-${{package.version}}.tar.gz
  - uses: perl/make
  - uses: autoconf/make
  - uses: autoconf/make-install
  - uses: perl/cleanup
  - uses: strip
subpackages:
  - name: perl-mime-lite-doc
    pipeline:
      - uses: split/manpages
    description: perl-mime-lite manpages
    test:
      pipeline:
        - uses: test/docs
test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: MIME::Lite
    - name: Verify MIME::Lite builds a multipart message with expected headers
      runs: |
        set -eu
        out=$(perl -MMIME::Lite -e '
          my $msg = MIME::Lite->new(
            From    => "from\@example.com",
            To      => "to\@example.com",
            Subject => "test subject",
            Type    => "multipart/mixed",
          );
          $msg->attach(Type => "TEXT", Data => "hello world");
          print $msg->as_string;
        ')
        echo "$out" | grep -F 'From: from@example.com'
        echo "$out" | grep -F 'To: to@example.com'
        echo "$out" | grep -F 'Subject: test subject'
        echo "$out" | grep -F 'multipart/mixed'
        echo "$out" | grep -F 'hello world'
update:
  enabled: true
  release-monitor:
    identifier: 3072
