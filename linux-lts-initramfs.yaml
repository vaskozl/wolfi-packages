# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: linux-lts-initramfs
  # datasource: alpine-base packageName: linux-lts
  version: 6.18.34
  epoch: 2 # decouple kernel pin/path from initramfs epoch
  description: The Linux LTS kernel initramfs
  copyright:
    - license: GPL-2.0
  dependencies:
    runtime:
      - linux-lts~${{package.version}}
      - zstd
environment:
  contents:
    packages:
      - attr
      - bash
      - binutils-dev
      - bootc
      - busybox
      - build-base
      - dracut
      - findutils
      - kmod
      - linux-lts~${{package.version}}
      - posix-libc-utils
      - wolfi-baselayout
      - zstd
      # For modules
      - blkid
      - btrfs-progs
      - cryptsetup
      - device-mapper
      - losetup
      - lvm2
      - mount
      - openssl
      - systemd
      - umount
      - util-linux
      - util-linux-login
pipeline:
  - runs: |
      set -eu
      # The installed linux-lts kernel is the only module tree present; use its
      # kernelrelease (which encodes Alpine's pkgrel) rather than this package's epoch.
      kver="$(ls /lib/modules)"
      [ "$(ls /lib/modules | wc -l)" -eq 1 ] || { echo "expected exactly one kernel in /lib/modules" >&2; ls -al /lib/modules >&2; exit 1; }
      mkdir -p /var/tmp "${{targets.destdir}}/usr/lib/modules/${kver}"
      depmod "${kver}"
      dracut --force --verbose --kernel-cmdline "SYSTEMD_SULOGIN_FORCE=1" \
        "${{targets.destdir}}/usr/lib/modules/${kver}/initramfs.img"
  - runs: |
      set -eu
      kver="$(ls /lib/modules)"
      ls -la "${{targets.destdir}}/usr/lib/modules/${kver}/"
update:
  enabled: false # alpine-base datasource (alpine/wolfi-pinned)
