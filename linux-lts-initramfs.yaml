# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: linux-lts-initramfs
  # datasource: alpine-base packageName: linux-lts
  version: 6.18.37
  epoch: 0
  description: The Linux LTS kernel initramfs
  copyright:
    - license: GPL-2.0
  dependencies:
    runtime:
      - linux-lts~${{package.version}}
      - zstd
environment:
  contents:
    packages:
      - attr
      - bash
      - binutils-dev
      - bootc
      - busybox
      - build-base
      - dracut
      - findutils
      - kmod
      - linux-lts~${{package.version}}
      - posix-libc-utils
      - wolfi-baselayout
      - zstd
      # For modules
      - blkid
      - btrfs-progs
      - cryptsetup
      - device-mapper
      - losetup
      - lvm2
      - mount
      - openssl
      - systemd
      - umount
      - util-linux
      - util-linux-login
pipeline:
  - runs: |
      set -eu
      # Derive the kernel module version from the installed module tree so it
      # tracks linux-lts independently of this package's epoch (e.g. 6.18.34-0-lts).
      kver=$(ls /lib/modules | head -n1)
      mkdir -p /var/tmp "${{targets.destdir}}/usr/lib/modules/$kver"
      ls -al /lib/modules
      depmod "$kver"
      dracut --force --verbose --kver "$kver" \
        --kernel-cmdline "SYSTEMD_SULOGIN_FORCE=1" \
        "${{targets.destdir}}/usr/lib/modules/$kver/initramfs.img"
  - runs: |
      set -eu
      kver=$(ls /lib/modules | head -n1)
      ls -la "${{targets.destdir}}/usr/lib/modules/$kver/"
update:
  enabled: false # alpine-base datasource (alpine/wolfi-pinned)
