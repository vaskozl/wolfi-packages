package:
  name: asahi-scripts
  version: "20250713"
  epoch: 1
  description: Asahi Linux maintenance scripts
  copyright:
    - license: MIT
  target-architecture:
    - aarch64
  dependencies:
    runtime:
      - asahi-fwextract
      - busybox
environment:
  contents:
    packages:
      - busybox
      - make
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/AsahiLinux/asahi-scripts
      tag: ${{package.version}}
      expected-commit: 800400dcf9612edd10f00d306a39a499313cefe3
  - uses: autoconf/make
    with:
      opts: |
        PREFIX=/usr
  - uses: autoconf/make
    with:
      opts: |
        PREFIX=/usr DESTDIR=${{targets.contextdir}} install-fedora
  - runs: |
      install -Dm644 LICENSE "${{targets.destdir}}/usr/share/licenses/${{package.name}}/LICENSE"
      # /etc/default/update-m1n1 — paths matching our m1n1, u-boot-asahi,
      # and linux-asahi packaging. update-m1n1.service sources this on each
      # kernel/m1n1 update to rebuild ESP:/m1n1/boot.bin.
      install -Dm644 update-m1n1.defaults "${{targets.destdir}}/etc/default/update-m1n1"
test:
  pipeline:
    - name: install-fedora artifacts present
      runs: |
        set -eu
        test -f /usr/share/asahi-scripts/functions.sh
        test -d /usr/lib/firmware/vendor
        test -f /usr/lib/dracut/dracut.conf.d/10-asahi.conf
        test -d /usr/lib/dracut/modules.d/91kernel-modules-asahi
        test -d /usr/lib/dracut/modules.d/99asahi-firmware
        test -x /usr/bin/asahi-diagnose
        test -x /usr/bin/asahi-fwupdate
        test -x /usr/bin/update-m1n1
        test -s /etc/default/update-m1n1
        grep -q '^M1N1=' /etc/default/update-m1n1
        grep -q '^U_BOOT=' /etc/default/update-m1n1
        grep -q '^DTBS=' /etc/default/update-m1n1
