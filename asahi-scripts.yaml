package:
  name: asahi-scripts
  version: "20250713"
  epoch: 0
  description: Asahi Linux maintenance scripts
  copyright:
    - license: MIT
  target-architecture:
    - aarch64
  dependencies:
    runtime:
      - asahi-fwextract
      - busybox
environment:
  contents:
    packages:
      - busybox
      - make
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/AsahiLinux/asahi-scripts
      tag: ${{package.version}}
      expected-commit: 800400dcf9612edd10f00d306a39a499313cefe3
  - uses: autoconf/make
    with:
      opts: |
        PREFIX=/usr
  - uses: autoconf/make
    with:
      opts: |
        PREFIX=/usr DESTDIR=${{targets.contextdir}} install-fedora
  - runs: |
      install -Dm644 LICENSE "${{targets.destdir}}/usr/share/licenses/${{package.name}}/LICENSE"

      # Oneshot service to sync m1n1 from the rootfs to the ESP after package
      # updates. update-m1n1 only writes if bytes differ, so running each boot
      # is cheap. Conditions ensure it no-ops on non-Asahi hosts and when no
      # /etc/default/update-m1n1 has been configured by the image builder.
      unitdir="${{targets.destdir}}/usr/lib/systemd/system"
      install -d "$unitdir/multi-user.target.wants"
      cat >"$unitdir/update-m1n1.service" <<'EOF'
      [Unit]
      Description=Sync m1n1 bootloader to the Apple Silicon ESP
      Documentation=https://github.com/AsahiLinux/asahi-scripts
      ConditionPathExists=/proc/device-tree/chosen/asahi,efi-system-partition
      ConditionPathExists=/etc/default/update-m1n1
      ConditionPathExists=/usr/bin/update-m1n1
      After=local-fs.target
      Before=multi-user.target

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/update-m1n1
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      EOF
      ln -sf ../update-m1n1.service \
        "$unitdir/multi-user.target.wants/update-m1n1.service"
test:
  pipeline:
    - name: install-fedora artifacts present
      runs: |
        set -eu
        test -f /usr/share/asahi-scripts/functions.sh
        test -d /usr/lib/firmware/vendor
        test -f /usr/lib/dracut/dracut.conf.d/10-asahi.conf
        test -d /usr/lib/dracut/modules.d/91kernel-modules-asahi
        test -d /usr/lib/dracut/modules.d/99asahi-firmware
        test -x /usr/bin/asahi-diagnose
        test -x /usr/bin/asahi-fwupdate
        test -x /usr/bin/update-m1n1
        test -f /usr/lib/systemd/system/update-m1n1.service
        test -L /usr/lib/systemd/system/multi-user.target.wants/update-m1n1.service
