# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: maddy
  version: "0.9.4"
  epoch: 1 # pin go-1.25, real tests, go-package
  description: All-in-one mail server (MTA, MDA, IMAP)
  copyright:
    - license: GPL-3.0-or-later
  dependencies:
    runtime:
      - ca-certificates
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25
      - scdoc

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/foxcpp/maddy
      tag: v${{package.version}}

  - uses: go/build
    with:
      go-package: go-1.25
      packages: ./cmd/maddy
      output: maddy
      ldflags: |
        -X github.com/foxcpp/maddy/version.Tag=v${{package.version}}

  - runs: |
      set -eu
      # Build manpage
      scdoc < docs/man/maddy.1.scd > maddy.1
      install -Dm644 maddy.1 "${{targets.destdir}}"/usr/share/man/man1/maddy.1

  - runs: |
      set -eu
      # Install example config
      install -Dm644 maddy.conf "${{targets.destdir}}"/etc/maddy/maddy.conf

      # Create directories
      mkdir -p "${{targets.destdir}}"/var/lib/maddy
      mkdir -p "${{targets.destdir}}"/var/spool/maddy

  - uses: strip

subpackages:
  - name: maddy-doc
    description: maddy documentation
    pipeline:
      - uses: split/manpages

  - name: maddy-vim
    description: maddy vim syntax files
    pipeline:
      - runs: |
          set -eu
          mkdir -p "${{targets.subpkgdir}}"/usr/share/vim
          cp -r dist/vim "${{targets.subpkgdir}}"/usr/share/vim/vimfiles

test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          maddy
    - uses: test/help-check
      with:
        bins: |
          maddy
    - name: maddy subcommands wired
      runs: |
        set -eu
        # urfave/cli enumerates subcommands in --help; fail if core ones are absent.
        out=$(maddy --help 2>&1)
        echo "$out" | grep -F run
        echo "$out" | grep -F creds
        # Exercise a real subcommand path (no DB needed for --help on a leaf).
        maddy creds --help >/dev/null
