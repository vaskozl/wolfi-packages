package:
  name: desktop-file-utils
  version: "0.28"
  epoch: 0
  description: Utilities for .desktop file handling (validate, install, update-database)
  copyright:
    - license: GPL-2.0-or-later
environment:
  contents:
    packages:
      - build-base
      - glib-dev
      - meson
      - pkgconf-dev
pipeline:
  - uses: git-checkout
    with:
      # repository: https://gitlab.freedesktop.org/xdg/desktop-file-utils
      repository: https://gitlab.freedesktop.org/xdg/desktop-file-utils
      tag: ${{package.version}}
  - uses: meson/configure
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: "${{package.name}}-doc"
    pipeline:
      - uses: split/manpages
    description: desktop-file-utils manpages
    test:
      pipeline:
        - uses: test/docs
test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/ver-check
      with:
        bins: |
          desktop-file-install
          desktop-file-validate
          update-desktop-database
    - uses: test/help-check
      with:
        bins: |
          desktop-file-install
          desktop-file-validate
    - name: Validate a real .desktop file
      runs: |
        set -eu
        cat > /tmp/foo.desktop <<'DSK'
        [Desktop Entry]
        Type=Application
        Name=Foo
        Exec=/usr/bin/true
        DSK
        desktop-file-validate /tmp/foo.desktop
