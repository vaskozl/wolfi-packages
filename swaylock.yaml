package:
  name: swaylock
  version: "1.8.5"
  epoch: 1 # use common test pipelines
  description: Screen locker for Wayland
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - build-base
      - cairo-dev
      - gdk-pixbuf-dev
      - libxkbcommon-dev
      - linux-pam-dev
      - meson
      - pango-dev
      - scdoc
      - wayland-dev
      - wayland-protocols
      - wayland-protocols-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/swaywm/swaylock
      tag: v${{package.version}}
  - runs: |
      ln -s /usr/bin/scdoc /usr/local/bin/scdoc
  - uses: meson/configure
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: swaylock manpages
  - name: ${{package.name}}-dbg
    pipeline:
      - uses: split/debug
    description: swaylock debug symbols
test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          swaylock
    - name: PAM config installed
      runs: |
        set -eu
        test -f /etc/pam.d/swaylock
