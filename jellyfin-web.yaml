# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: jellyfin-web
  version: "10.11.6"
  epoch: 0
  description: Web Client for Jellyfin
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - jellyfin
      - nodejs
environment:
  contents:
    packages:
      - busybox
      - jellyfin
      - nodejs
      - npm
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jellyfin/jellyfin-web
      tag: v${{package.version}}
  - name: build
    runs: |
      npm ci --no-audit --unsafe-perm
      npm run build:production
      mkdir -p "${{targets.destdir}}"/usr/lib/jellyfin/jellyfin-web
      cp -r dist/* "${{targets.destdir}}"/usr/lib/jellyfin/jellyfin-web
  - uses: strip
test:
  environment:
    contents:
      packages:
        - python3
        - wget
  pipeline:
    - runs: |
        # Run a basic HTTP server for the generated content
        cd /usr/lib/jellyfin/jellyfin-web || exit
        python3 -m http.server > /dev/null 2>&1 &
        sleep 1
        wget --spider --recursive -e robots=off --page-requisites http://localhost:8000
