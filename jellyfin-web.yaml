# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: jellyfin-web
  version: "10.11.6"
  epoch: 0
  description: Web Client for Jellyfin
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - jellyfin
      - nodejs
environment:
  contents:
    packages:
      - busybox
      - jellyfin
      - nodejs
      - npm
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jellyfin/jellyfin-web
      tag: v${{package.version}}
  - name: build
    runs: |
      npm ci --no-audit --unsafe-perm
      npm run build:production
      mkdir -p "${{targets.destdir}}"/usr/lib/jellyfin/jellyfin-web
      cp -r dist/* "${{targets.destdir}}"/usr/lib/jellyfin/jellyfin-web
  - uses: strip
test:
  pipeline:
    - name: Verify jellyfin-web installation
      runs: |
        test -d /usr/lib/jellyfin/jellyfin-web || exit 1
        test -f /usr/lib/jellyfin/jellyfin-web/index.html || exit 1
