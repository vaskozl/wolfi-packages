package:
  name: qt6-qtsvg
  version: "6.10.2"
  epoch: 0
  description: Classes for displaying the contents of SVG files
  copyright:
    - license: LGPL-2.1-only AND LGPL-3.0-only AND GPL-3.0-only AND Qt-GPL-exception-1.0
  dependencies:
    runtime:
      - glibc
      - libstdc++
      - qt6-qtbase
  resources:
    cpu: "4"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - glibc-dev
      - libstdc++-dev
      - qt6-qtbase-dev
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/qt/qtsvg
      tag: v${{package.version}}

  - runs: |
      cmake -B build \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DBUILD_SHARED_LIBS=ON \
        -DBUILD_TESTING=OFF \
        -DQT_FEATURE_bundled_qjpeg=ON
      cmake --build build
      cmake --install build --destdir "${{targets.destdir}}"

  - uses: strip

subpackages:
  - name: qt6-qtsvg-dev
    description: Classes for displaying the contents of SVG files (development files)
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - runs: |
            test -f /usr/include/QtSvg/QSvgGenerator
            test -f /usr/lib/libQt6Svg.so
  - name: qt6-qtsvg-doc
    description: Classes for displaying the contents of SVG files (documentation)
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - busybox
  pipeline:
    - name: Verify QtSvg library exists
      runs: |
        test -f /usr/lib/libQt6Svg.so
    - name: Verify QtSvgWidgets library exists
      runs: |
        test -f /usr/lib/libQt6SvgWidgets.so
