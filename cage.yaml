package:
  name: cage
  version: "0.3.0"
  epoch: 3 # add explicit libwlroots soname dep (melange SCA misses it)
  description: A Wayland kiosk
  copyright:
    - license: MIT
  dependencies:
    runtime:
      # melange SCA misses the libwlroots-0.X.so soname dep — its detector
      # only emits so: deps for names containing ".so.", and wlroots embeds
      # the major version into the basename (libwlroots-0.20.so) instead of
      # using a trailing .so.X suffix. Pin the soname manually so apk refuses
      # to install us against an incompatible wlroots ABI. Update this when
      # wlroots bumps to a new major version (e.g. 0.21).
      - so:libwlroots-0.20.so
environment:
  contents:
    packages:
      - build-base
      - meson
      - scdoc
      - wayland-protocols
      - wayland-protocols-dev
      - wlroots
      - wlroots-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cage-kiosk/cage
      tag: v${{package.version}}
  - runs: |
      ln -s /usr/bin/scdoc /usr/local/bin/scdoc
  - uses: meson/configure
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: cage manpages
test:
  pipeline:
    - runs: |
        set -eu
        cage -v
