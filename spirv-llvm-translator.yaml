# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: spirv-llvm-translator
  version: "22.1.3"
  epoch: 0 # rebuild against local spirv-tools
  description: Khronos SPIR-V translator for the LLVM toolchain (LLVM 22)
  copyright:
    - license: NCSA AND Apache-2.0 WITH LLVM-exception
  target-architecture:
    - x86_64
  dependencies:
    runtime:
      - libstdc++
      - spirv-tools
environment:
  contents:
    packages:
      - build-base
      - clang-22
      - cmake
      - libclang-cpp-22
      - libxml2-dev
      - llvm-22-dev
      - samurai
      - spirv-tools
      - spirv-tools-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/KhronosGroup/SPIRV-LLVM-Translator
      tag: v${{package.version}}
  - uses: git-checkout
    with:
      repository: https://github.com/KhronosGroup/SPIRV-Headers
      expected-commit: b8a32968473ce852a809b9de5f04f02a5a9dfa78
      depth: -1
      destination: spirv-headers
  - runs: |
      set -eu
      CC=clang CXX=clang++ cmake -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DBUILD_SHARED_LIBS=True \
        -DLLVM_SPIRV_INCLUDE_TESTS=OFF \
        -DLLVM_DIR=/usr/lib/llvm-22/lib/cmake/llvm \
        -DLLVM_EXTERNAL_SPIRV_HEADERS_SOURCE_DIR="$PWD/spirv-headers"
      cmake --build build
      DESTDIR="${{targets.destdir}}" cmake --install build
  - uses: strip
subpackages:
  - name: ${{package.name}}-dev
    description: ${{package.name}} development libraries and headers
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ${{package.name}}
    test:
      pipeline:
        - uses: test/pkgconf
test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
    - uses: test/ver-check
      with:
        bins: |
          llvm-spirv
    - uses: test/help-check
      with:
        bins: |
          llvm-spirv
    - name: llvm-spirv runs
      runs: |
        set -eu
        llvm-spirv --version
update:
  enabled: true
  github:
    identifier: KhronosGroup/SPIRV-LLVM-Translator
    strip-prefix: v
