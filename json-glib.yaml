package:
  name: json-glib
  version: 1.10.8
  epoch: 0
  description: JSON library built on GLib
  copyright:
    - license: LGPL-2.1-or-later
environment:
  contents:
    packages:
      - build-base
      - glib-dev
      - meson
      - pkgconf
pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/json-glib
      tag: ${{package.version}}
  - uses: meson/configure
    with:
      opts: |
        -Dconformance=false \
        -Ddocumentation=disabled \
        -Dinstalled_tests=false \
        -Dintrospection=disabled \
        -Dtests=false
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: ${{package.name}}-dev
    description: json-glib development headers and pkg-config files
    pipeline:
      - uses: split/dev
    test:
      environment:
        contents:
          packages:
            - pkgconf
      pipeline:
        - runs: pkg-config --exists json-glib-1.0
test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        set -eu
        echo '{"key": "value"}' > /tmp/test.json
        json-glib-validate /tmp/test.json
