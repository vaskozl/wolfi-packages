package:
  name: pipewire
  version: 1.6.4
  epoch: 1
  description: Multimedia processing graphs
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - alsa-lib-dev
      - avahi-dev
      - bluez-dev
      - build-base
      - dbus-dev
      - fftw-dev
      - glib-dev
      - gst-plugins-base-dev
      - gstreamer-dev
      - libsndfile-dev
      - libusb-dev
      - libxcb-dev
      - libxfixes-dev
      - meson
      - openssl-dev
      - opus-dev
      - pulseaudio-dev
      - readline-dev
      - sbc-dev
      - systemd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/pipewire/pipewire.git
      tag: ${{package.version}}
  - uses: meson/configure
    with:
      opts: |
        --auto-features=enabled \
        -Dbluez5-codec-aac=disabled \
        -Dbluez5-codec-aptx=disabled \
        -Dbluez5-codec-lc3=disabled \
        -Dbluez5-codec-lc3plus=disabled \
        -Dbluez5-codec-ldac=disabled \
        -Dbluez5-codec-ldac-dec=disabled \
        -Dbluez5-backend-ofono=disabled \
        -Dbluez5-plc-spandsp=disabled \
        -Debur128=disabled \
        -Decho-cancel-webrtc=disabled \
        -Dexamples=disabled \
        -Djack=disabled \
        -Djack-devel=true \
        -Dlibcamera=disabled \
        -Dlibcanberra=disabled \
        -Dlibffado=disabled \
        -Dlibjack-path=/usr/lib \
        -Dlibmysofa=disabled \
        -Dlibv4l2-path=/usr/lib \
        -Dlv2=disabled \
        -Donnxruntime=disabled \
        -Droc=disabled \
        -Dsdl2=disabled \
        -Dselinux=disabled \
        -Dsession-managers=[] \
        -Dsnap=disabled \
        -Dtests=disabled \
        -Dudevrulesdir=/usr/lib/udev/rules.d
  - uses: meson/compile
  - uses: meson/install
  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: ${{package.name}} development libraries and headers
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf

  - name: ${{package.name}}-pulse
    description: PulseAudio replacement (pipewire-pulse) for pipewire
    dependencies:
      runtime:
        - wireplumber
        - pulseaudio-utils
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/usr/lib/pipewire-0.3 \
                   "${{targets.subpkgdir}}"/usr/share/pipewire
          mv "${{targets.destdir}}"/usr/bin/pipewire-pulse \
             "${{targets.subpkgdir}}"/usr/bin/
          mv "${{targets.destdir}}"/usr/lib/pipewire-0.3/libpipewire-module-protocol-pulse.so \
             "${{targets.subpkgdir}}"/usr/lib/pipewire-0.3/
          mv "${{targets.destdir}}"/usr/lib/pipewire-0.3/libpipewire-module-pulse-tunnel.so \
             "${{targets.subpkgdir}}"/usr/lib/pipewire-0.3/
          mv "${{targets.destdir}}"/usr/lib/pipewire-0.3/libpipewire-module-filter-chain.so \
             "${{targets.subpkgdir}}"/usr/lib/pipewire-0.3/
          mv "${{targets.destdir}}"/usr/share/pipewire/pipewire-pulse.conf \
             "${{targets.subpkgdir}}"/usr/share/pipewire/
          if [ -d "${{targets.destdir}}"/usr/share/pipewire/pipewire-pulse.conf.avail ]; then
            mv "${{targets.destdir}}"/usr/share/pipewire/pipewire-pulse.conf.avail \
               "${{targets.subpkgdir}}"/usr/share/pipewire/
          fi
    test:
      pipeline:
        - uses: test/ldd-check
          with:
            packages: ${{package.name}}-pulse

test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
