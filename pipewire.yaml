package:
  name: pipewire
  version: 1.4.10
  epoch: 1 # disable default-enabled features that need missing build deps
  description: Multimedia processing graphs
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - meson

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/pipewire/pipewire.git
      tag: ${{package.version}}
  - uses: meson/configure
    with:
      opts: |
        --auto-features=disabled
        -Ddbus=disabled
        -Dflatpak=disabled
        -Dpipewire-jack=disabled
        -Dpipewire-v4l2=disabled
        -Dexamples=disabled
        -Dtests=disabled
        -Dsystemd-user-service=disabled
        -Dsession-managers=[]
        -Dudevrulesdir=/usr/lib/udev/rules.d
  - uses: meson/compile
  - uses: meson/install
  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: ${{package.name}} development libraries and headers
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf

test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
