package:
  name: pipewire
  version: 1.4.10
  epoch: 10
  description: Multimedia processing graphs
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - alsa-lib-dev
      - avahi-dev
      - bluez-dev
      - build-base
      - dbus-dev
      - gst-plugins-base-dev
      - gstreamer-dev
      - libusb-dev
      - meson
      - readline-dev
      - sbc-dev
      - vulkan-headers

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/pipewire/pipewire.git
      tag: ${{package.version}}
  - uses: meson/configure
    with:
      opts: |
        --auto-features=disabled \
        -Dalsa=enabled \
        -Davahi=enabled \
        -Dbluez5=enabled \
        -Ddbus=enabled \
        -Dexamples=disabled \
        -Dflatpak=disabled \
        -Dffmpeg=disabled \
        -Dgstreamer=enabled \
        -Djack-devel=true \
        -Dlibjack-path=/usr/lib \
        -Dlibusb=enabled \
        -Dlibv4l2-path=/usr/lib \
        -Dlv2=disabled \
        -Dman=disabled \
        -Dpipewire-jack=enabled \
        -Dpipewire-v4l2=disabled \
        -Dreadline=enabled \
        -Droc=disabled \
        -Dsdl2=disabled \
        -Dsession-managers=[] \
        -Dsystemd=disabled \
        -Dlogind=disabled \
        -Dtests=disabled \
        -Dvulkan=enabled
  - uses: meson/compile
  - uses: meson/install
  - uses: strip

subpackages:
  - name: ${{package.name}}-tools
    description: PipeWire command-line tools (pw-cli, pw-top, pw-dump, pw-cat, pw-play, pw-record etc.)
    dependencies:
      runtime:
        - pipewire
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/bin"
          for bin in pw-cli pw-top pw-dump pw-play pw-record pw-cat pw-mididump \
                     pw-jack pw-loopback pw-mon pw-profiler; do
            if [ -f "${{targets.destdir}}/usr/bin/$bin" ]; then
              mv "${{targets.destdir}}/usr/bin/$bin" \
                 "${{targets.subpkgdir}}/usr/bin/"
            fi
          done
    test:
      pipeline:
        - uses: test/help-check
          with:
            bins: pw-cli

  - name: ${{package.name}}-spa-tools
    description: SPA inspection and diagnostic tools (spa-inspect, spa-monitor)
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/bin"
          for bin in spa-inspect spa-monitor spa-json-dump; do
            if [ -f "${{targets.destdir}}/usr/bin/$bin" ]; then
              mv "${{targets.destdir}}/usr/bin/$bin" \
                 "${{targets.subpkgdir}}/usr/bin/"
            fi
          done

  - name: ${{package.name}}-jack
    description: JACK compatibility library — makes JACK apps use PipeWire transparently
    dependencies:
      runtime:
        - pipewire
    pipeline:
      - runs: |
          # libjack.so compatibility library
          mkdir -p "${{targets.subpkgdir}}/usr/lib"
          find "${{targets.destdir}}/usr/lib" -name 'libjack*.so*' \
            -exec mv {} "${{targets.subpkgdir}}/usr/lib/" \;
          # JACK SPA plugin and pipewire module
          for dir in pipewire-0.3 spa-0.2; do
            if [ -d "${{targets.destdir}}/usr/lib/$dir/jack" ]; then
              mkdir -p "${{targets.subpkgdir}}/usr/lib/$dir"
              mv "${{targets.destdir}}/usr/lib/$dir/jack" \
                 "${{targets.subpkgdir}}/usr/lib/$dir/"
            fi
          done
          # jack.conf
          if [ -f "${{targets.destdir}}/usr/share/pipewire/jack.conf" ]; then
            mkdir -p "${{targets.subpkgdir}}/usr/share/pipewire"
            mv "${{targets.destdir}}/usr/share/pipewire/jack.conf" \
               "${{targets.subpkgdir}}/usr/share/pipewire/"
          fi

  - name: ${{package.name}}-jack-dev
    description: JACK development headers provided by PipeWire (replaces jack-dev)
    dependencies:
      runtime:
        - pipewire-jack
    pipeline:
      - runs: |
          # jack headers installed by pipewire-jack compat layer
          if [ -d "${{targets.destdir}}/usr/include/jack" ]; then
            mkdir -p "${{targets.subpkgdir}}/usr/include"
            mv "${{targets.destdir}}/usr/include/jack" \
               "${{targets.subpkgdir}}/usr/include/"
          fi
          # jack.pc
          if [ -f "${{targets.destdir}}/usr/lib/pkgconfig/jack.pc" ]; then
            mkdir -p "${{targets.subpkgdir}}/usr/lib/pkgconfig"
            mv "${{targets.destdir}}/usr/lib/pkgconfig/jack.pc" \
               "${{targets.subpkgdir}}/usr/lib/pkgconfig/"
          fi

  - name: gst-plugin-${{package.name}}
    description: GStreamer plugin for PipeWire audio/video
    dependencies:
      runtime:
        - gstreamer
        - gst-plugins-base
        - pipewire
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/lib/gstreamer-1.0"
          find "${{targets.destdir}}/usr/lib/gstreamer-1.0" -name '*.so' \
            -exec mv {} "${{targets.subpkgdir}}/usr/lib/gstreamer-1.0/" \; 2>/dev/null || true

  - name: ${{package.name}}-zeroconf
    description: Zeroconf/mDNS network audio discovery module
    dependencies:
      runtime:
        - avahi
        - pipewire
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/lib/pipewire-0.3"
          find "${{targets.destdir}}/usr/lib/pipewire-0.3" \
            -name '*zeroconf*' \
            -exec mv {} "${{targets.subpkgdir}}/usr/lib/pipewire-0.3/" \; 2>/dev/null || true
          # AVB (Audio Video Bridging) network SPA plugin
          if [ -d "${{targets.destdir}}/usr/lib/spa-0.2/avb" ]; then
            mkdir -p "${{targets.subpkgdir}}/usr/lib/spa-0.2"
            mv "${{targets.destdir}}/usr/lib/spa-0.2/avb" \
               "${{targets.subpkgdir}}/usr/lib/spa-0.2/"
          fi

  - name: ${{package.name}}-spa-bluez
    description: Bluetooth audio SPA plugin (A2DP, HFP/HSP via BlueZ)
    dependencies:
      runtime:
        - bluez
        - pipewire
    pipeline:
      - runs: |
          if [ -d "${{targets.destdir}}/usr/lib/spa-0.2/bluez5" ]; then
            mkdir -p "${{targets.subpkgdir}}/usr/lib/spa-0.2"
            mv "${{targets.destdir}}/usr/lib/spa-0.2/bluez5" \
               "${{targets.subpkgdir}}/usr/lib/spa-0.2/"
          fi

  - name: ${{package.name}}-spa-vulkan
    description: Vulkan compute SPA plugin
    dependencies:
      runtime:
        - pipewire
    pipeline:
      - runs: |
          if [ -d "${{targets.destdir}}/usr/lib/spa-0.2/vulkan" ]; then
            mkdir -p "${{targets.subpkgdir}}/usr/lib/spa-0.2"
            mv "${{targets.destdir}}/usr/lib/spa-0.2/vulkan" \
               "${{targets.subpkgdir}}/usr/lib/spa-0.2/"
          fi

  - name: ${{package.name}}-pulse
    description: PulseAudio-compatible server daemon (drop-in replacement)
    dependencies:
      runtime:
        - pipewire
    pipeline:
      - runs: |
          if [ -f "${{targets.destdir}}/usr/bin/pipewire-pulse" ]; then
            mkdir -p "${{targets.subpkgdir}}/usr/bin"
            mv "${{targets.destdir}}/usr/bin/pipewire-pulse" \
               "${{targets.subpkgdir}}/usr/bin/"
          fi

  - name: ${{package.name}}-alsa
    description: ALSA SPA plugin and config to route ALSA apps through pipewire
    dependencies:
      runtime:
        - pipewire
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/share" \
                   "${{targets.subpkgdir}}/usr/lib/alsa-lib"
          if [ -d "${{targets.destdir}}/usr/share/alsa" ]; then
            mv "${{targets.destdir}}/usr/share/alsa" \
               "${{targets.subpkgdir}}/usr/share/"
          fi
          find "${{targets.destdir}}/usr/lib" -name 'libasound_module*' \
            -exec mv {} "${{targets.subpkgdir}}/usr/lib/alsa-lib/" \;

  - name: ${{package.name}}-dev
    description: ${{package.name}} development libraries and headers
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf

test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
