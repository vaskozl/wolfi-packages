package:
  name: pipewire
  version: 1.6.4
  epoch: 1 # split pipewire-pulse subpackage
  description: Multimedia processing graphs
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - alsa-lib-dev
      - avahi-dev
      - bluez-dev
      - build-base
      - dbus-dev
      - fftw-dev
      - glib-dev
      - gst-plugins-base-dev
      - gstreamer-dev
      - libsndfile-dev
      - libusb-dev
      - libxcb-dev
      - libxfixes-dev
      - meson
      - openssl-dev
      - opus-dev
      - pulseaudio-dev
      - readline-dev
      - sbc-dev
      - systemd-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/pipewire/pipewire.git
      tag: ${{package.version}}
  - uses: meson/configure
    with:
      opts: |
        --auto-features=enabled \
        -Dbluez5-codec-aac=disabled \
        -Dbluez5-codec-aptx=disabled \
        -Dbluez5-codec-lc3=disabled \
        -Dbluez5-codec-lc3plus=disabled \
        -Dbluez5-codec-ldac=disabled \
        -Dbluez5-codec-ldac-dec=disabled \
        -Dbluez5-backend-native-mm=disabled \
        -Dbluez5-backend-ofono=disabled \
        -Dbluez5-plc-spandsp=disabled \
        -Ddocs=disabled \
        -Debur128=disabled \
        -Decho-cancel-webrtc=disabled \
        -Dexamples=disabled \
        -Dffmpeg=disabled \
        -Djack=disabled \
        -Djack-devel=true \
        -Dlibcamera=disabled \
        -Dlibcanberra=disabled \
        -Dlibffado=disabled \
        -Dlibjack-path=/usr/lib \
        -Dlibmysofa=disabled \
        -Dlibv4l2-path=/usr/lib \
        -Dlv2=disabled \
        -Dman=disabled \
        -Donnxruntime=disabled \
        -Droc=disabled \
        -Dsdl2=disabled \
        -Dselinux=disabled \
        -Dsession-managers=[] \
        -Dsnap=disabled \
        -Dsystemd-system-service=disabled \
        -Dsystemd-user-unit-dir=/usr/lib/systemd/user \
        -Dtests=disabled \
        -Dudevrulesdir=/usr/lib/udev/rules.d \
        -Dvulkan=disabled
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: ${{package.name}}-dev
    description: ${{package.name}} development libraries and headers
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
  - name: ${{package.name}}-pulse
    description: PulseAudio replacement using PipeWire
    dependencies:
      runtime:
        - wireplumber
    pipeline:
      - runs: |
          set -eu
          cd "${{targets.destdir}}"
          mkdir -p "${{targets.subpkgdir}}/usr/bin"
          mv usr/bin/pipewire-pulse "${{targets.subpkgdir}}/usr/bin/"
          mkdir -p "${{targets.subpkgdir}}/usr/lib/pipewire-0.3"
          mv usr/lib/pipewire-0.3/libpipewire-module-protocol-pulse.so \
             usr/lib/pipewire-0.3/libpipewire-module-pulse-tunnel.so \
             "${{targets.subpkgdir}}/usr/lib/pipewire-0.3/"
          mkdir -p "${{targets.subpkgdir}}/usr/share/pipewire"
          mv usr/share/pipewire/pipewire-pulse.conf \
             usr/share/pipewire/pipewire-pulse.conf.avail \
             "${{targets.subpkgdir}}/usr/share/pipewire/"
          mkdir -p "${{targets.subpkgdir}}/usr/share/glib-2.0/schemas"
          mv usr/share/glib-2.0/schemas/org.freedesktop.pulseaudio.gschema.xml \
             "${{targets.subpkgdir}}/usr/share/glib-2.0/schemas/"
          if [ -e usr/lib/systemd/user/pipewire-pulse.service ]; then
            mkdir -p "${{targets.subpkgdir}}/usr/lib/systemd/user"
            mv usr/lib/systemd/user/pipewire-pulse.service \
               "${{targets.subpkgdir}}/usr/lib/systemd/user/"
          fi
          if [ -e usr/lib/systemd/user/pipewire-pulse.socket ]; then
            mv usr/lib/systemd/user/pipewire-pulse.socket \
               "${{targets.subpkgdir}}/usr/lib/systemd/user/"
          fi
    test:
      pipeline:
        - uses: test/ver-check
          with:
            bins: pipewire-pulse
        - uses: test/help-check
          with:
            bins: pipewire-pulse
test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
