package:
  name: pipewire
  version: 1.4.10
  epoch: 4 # remove invalid -Dpipewire-pulse meson opt; pulse binary built via dbus
  description: Multimedia processing graphs
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - alsa-lib-dev
      - build-base
      - dbus-dev
      - meson

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/pipewire/pipewire.git
      tag: ${{package.version}}
  - uses: meson/configure
    with:
      opts: |
        --auto-features=disabled \
        -Dalsa=enabled \
        -Ddbus=enabled \
        -Dudevrulesdir=/usr/lib/udev/rules.d \
        -Dsession-managers=[] \
        -Dtests=disabled \
        -Dexamples=disabled \
        -Dsystemd-user-service=disabled \
        -Dflatpak=disabled \
        -Dpipewire-jack=disabled \
        -Dpipewire-v4l2=disabled
  - uses: meson/compile
  - uses: meson/install
  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: ${{package.name}} development libraries and headers
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf

  - name: ${{package.name}}-pulse
    description: PulseAudio-compatible server daemon (drop-in replacement)
    dependencies:
      runtime:
        - pipewire
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/bin"
          mv "${{targets.destdir}}/usr/bin/pipewire-pulse" \
             "${{targets.subpkgdir}}/usr/bin/"

  - name: ${{package.name}}-alsa
    description: ALSA SPA plugin and config to route ALSA apps through pipewire
    dependencies:
      runtime:
        - pipewire
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/share" \
                   "${{targets.subpkgdir}}/usr/lib/alsa-lib"
          if [ -d "${{targets.destdir}}/usr/share/alsa" ]; then
            mv "${{targets.destdir}}/usr/share/alsa" \
               "${{targets.subpkgdir}}/usr/share/"
          fi
          find "${{targets.destdir}}/usr/lib" -name 'libasound_module*' \
            -exec mv {} "${{targets.subpkgdir}}/usr/lib/alsa-lib/" \;

test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
