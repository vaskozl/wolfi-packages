# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: kromgo
  version: "0.10.0"
  epoch: 0 # pin go-1.25 + go-package
  description: Expose prometheus metrics safely to a public source.
  copyright:
    - license: Apache-2.0
environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kashalls/kromgo
      tag: v${{package.version}}
  - uses: go/build
    with:
      packages: ./cmd/kromgo
      output: kromgo
      go-package: go-1.25
  - uses: strip
test:
  pipeline:
    - uses: test/help-check
      with:
        bins: |
          kromgo
update:
  enabled: true
  github:
    identifier: kashalls/kromgo
    strip-prefix: v
    use-tag: true
    tag-filter-prefix: v
