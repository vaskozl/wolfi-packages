workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

stages: [generate, build]

generate:
  stage: generate
  image:
    name: ghcr.io/vaskozl/melange:0.50.4@sha256:fa3d4159ecf0402860fd768ed8dd9ba349e5623d4aab9138943d5fc00fd076ae
    entrypoint: [""]
  script:
    - .gitlab/gen-dag.sh > generated-pipeline.yml
  artifacts:
    paths: [generated-pipeline.yml]

build:
  stage: build
  needs: [generate]
  trigger:
    include:
      - artifact: generated-pipeline.yml
        job: generate
    strategy: depend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        IS_MAIN: "true"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        IS_MAIN: "false"
