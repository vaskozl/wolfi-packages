workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    # Allow the dynamic child pipeline triggered by `build:` (which `include:`s
    # this file to inherit `.build`) to actually run.
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"

stages: [generate, build]

# Shared template. The per-package jobs in the child pipeline emitted by
# .gitlab/gen-dag.sh `extends: .build` after including this file. Renovate's
# gitlabci manager bumps the pinned melange image here, and `generate:` below
# pulls the same image via !reference so the pin lives in exactly one place.
.build:
  stage: build
  interruptible: true
  image:
    name: ghcr.io/vaskozl/melange:0.53.0@sha256:1ef2d61d99de7d57b586026cc7a491c066311154b3bfe183880083b0215e3a17
    entrypoint: [""]
  before_script:
    - |
      set -eu
      # Caches (/apks/{melange,apks}-cache) are content-addressed and safe to
      # share between main and MR jobs. Only OUT_DIR — where signed apks land
      # and become servable — must stay MR-private.
      export CACHE_DIR=/apks/melange-cache
      export APK_CACHE_DIR=/apks/apks-cache
      if [ "$IS_MAIN" = "true" ]; then
        echo "${MELANGE_RSA}" > melange.rsa
        # The committed melange.rsa.pub is the source of truth; sync it to
        # /apks (served via apks.sko.ai) so downstream consumers always see
        # the current public key.
        if ! diff -q /apks/melange.rsa.pub melange.rsa.pub; then
          echo "syncing committed melange.rsa.pub → /apks/melange.rsa.pub"
          cp melange.rsa.pub /apks/melange.rsa.pub
        fi
        export OUT_DIR=/apks
      else
        melange keygen melange.rsa
        export OUT_DIR=$CI_PROJECT_DIR/packages
        # MR builds use a per-job throwaway key, so dependent jobs cannot
        # verify signatures on locally-built packages from prior jobs.
        export MELANGE_FLAGS="$MELANGE_FLAGS --ignore-signatures"
      fi
      mkdir -p "$OUT_DIR" "$CACHE_DIR" "$APK_CACHE_DIR"
      cat >> common.env <<EOF
      export GIT_CONFIG_COUNT=1
      export GIT_CONFIG_KEY_0=url.https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/.insteadOf
      export GIT_CONFIG_VALUE_0=https://${CI_SERVER_HOST}/
      EOF
  variables:
    MELANGE_FLAGS: >-
      --workspace-dir=$CI_PROJECT_DIR
      --arch=$ARCH
      --runner=bubblewrap
      --repository-append=https://apks.sko.ai,https://packages.wolfi.dev/os
      --keyring-append=melange.rsa.pub,https://apks.sko.ai/melange.rsa.pub,https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
      --pipeline-dirs=./pipelines
      --env-file=common.env
  retry: 1
  # MR builds write packages to $CI_PROJECT_DIR/packages (OUT_DIR).
  # Uploading that directory as an artifact lets dependent jobs (those with
  # a `needs:` edge pointing here) download it and resolve locally-built
  # packages when the published repo doesn't have the new version yet.
  # On main builds OUT_DIR=/apks (NFS, outside the project dir), so nothing
  # is uploaded — main jobs share packages via NFS instead.
  artifacts:
    paths:
      - packages/
    expire_in: 2h
    when: always
  script:
    - >-
      melange build "$PKG" $MELANGE_FLAGS
      --source-dir="${PKG%.yaml}"
      --out-dir="$OUT_DIR"
      --cache-dir="$CACHE_DIR"
      --apk-cache-dir="$APK_CACHE_DIR"
      --repository-append="$OUT_DIR"
      --signing-key=melange.rsa
    - >-
      melange test "$PKG" $MELANGE_FLAGS
      --source-dir="${PKG%.yaml}"
      --apk-cache-dir="$APK_CACHE_DIR"
      --repository-append="$OUT_DIR"
      --test-package-append=busybox
      --ignore-signatures

generate:
  stage: generate
  interruptible: true
  image: !reference [.build, image]
  script:
    # Fail MRs that edit a yaml without bumping version/epoch, or bump a
    # yaml without propagating epoch to its reverse-deps. On main this is
    # a no-op (origin/main diffs against itself).
    - BASE_REF=origin/main .gitlab/bump-epochs.pl --check
    - .gitlab/gen-dag.sh > generated-pipeline.yml
  artifacts:
    paths: [generated-pipeline.yml]
  rules:
    # Skip when this file is re-evaluated inside the child pipeline.
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
      when: never
    # Main branch publishes packages to NFS -- don't cancel mid-build.
    - if: $CI_COMMIT_BRANCH == "main"
      interruptible: false
    - when: on_success

build:
  stage: build
  interruptible: true
  needs: [generate]
  trigger:
    include:
      - artifact: generated-pipeline.yml
        job: generate
    strategy: depend
  rules:
    # Skip when this file is re-evaluated inside the child pipeline (otherwise
    # the trigger here would spawn another child → infinite recursion).
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      interruptible: false
      variables:
        IS_MAIN: "true"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        IS_MAIN: "false"
