workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

stages: [generate, build]

generate:
  stage: generate
  image:
    name: ghcr.io/vaskozl/melange:0.50.5@sha256:57513d085d9196ef06330a89a38fa4c9586175b40c471d2b9dbff15b82305beb
    entrypoint: [""]
  script:
    - .gitlab/gen-dag.sh > generated-pipeline.yml
  artifacts:
    paths: [generated-pipeline.yml]

build:
  stage: build
  needs: [generate]
  trigger:
    include:
      - artifact: generated-pipeline.yml
        job: generate
    strategy: depend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        IS_MAIN: "true"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        IS_MAIN: "false"
