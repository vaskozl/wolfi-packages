package:
  name: py3-pyqt6-sip
  version: "13.11.1"
  epoch: 0
  description: SIP module for PyQt6
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - python3
      - py3-sip
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - python3
      - python3-dev
      - py3-installer
      - py3-wheel
      - py3-build

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/PyQtClub/PyQt6-sip
      tag: ${{package.version}}

  - runs: |
      python3 -m installer --destdir="${{targets.destdir}}" \
        $(python3 -m build --wheel)

  - uses: strip

test:
  environment:
    contents:
      packages:
        - busybox
        - python3
  pipeline:
    - name: Verify PyQt6.sip module exists
      runs: |
        python3 -c "import PyQt6.sip; print('PyQt6.sip module loaded successfully')"
