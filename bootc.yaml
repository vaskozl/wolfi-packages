package:
  name: bootc
  version: "1.16.1"
  epoch: 0 # drop --apply from fetch-apply-updates.service
  description: Boot and upgrade via container images
  copyright:
    - license: Apache-2.0-only
  dependencies:
    runtime:
      - fstrim
      - ostree
      - composefs
      - mount
      - umount
      - util-linux-misc
environment:
  contents:
    packages:
      - build-base
      - busybox
      - cargo-auditable
      - go-md2man
      - ostree-dev
      - rust
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bootc-dev/bootc
      tag: v${{package.version}}
  - uses: patch
    with:
      patches: fetch-apply-updates-composefs-condition.patch
  - runs: |
      make bin install-all \
        STORAGE_RELATIVE_PATH=/sysroot/ostree/bootc/storage \
        DESTDIR="${{targets.contextdir}}" \
        V=1
  - runs: |
      mkdir -p ${{ targets.destdir }}/usr/lib/ostree/
      install -Dm644 ./prepare-root.conf ${{ targets.destdir }}/usr/lib/ostree/prepare-root.conf
      install -Dm644 ./bootc-base-dirs.conf ${{targets.destdir}}/usr/lib/tmpfiles.d/bootc-base-dirs.conf
  - uses: strip
subpackages:
  - name: bootc-doc
    pipeline:
      - uses: split/manpages
    description: bootc manpages
test:
  environment:
    contents:
      packages:
        - yq
  pipeline:
    - runs: |
        set -eu
        bootc --version | grep -F -e "${{package.version}}"
        bootc status | yq .apiVersion | grep -F -e "org.containers.bootc/v1"
update:
  enabled: true
  github:
    identifier: bootc-dev/bootc
    strip-prefix: v
