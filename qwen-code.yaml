package:
  name: qwen-code
  version: "0.14.3"
  epoch: 0
  description: AI agent that lives in your terminal, optimized for Qwen3-Coder
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - nodejs

vars:
  node-version: 25
  node-options: "--max-old-space-size=16384"

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - node-gyp
      - nodejs-${{vars.node-version}}
      - npm
      - pnpm
  environment:
    NPM_CONFIG_LOGLEVEL: warn
    NODE_OPTIONS: "${{vars.node-options}}"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/QwenLM/qwen-code
      tag: v${{package.version}}

  - runs: |
      export NODE_OPTIONS="${{vars.node-options}}"
      npm install --legacy-peer-deps --ignore-scripts

  - runs: |
      export NODE_OPTIONS="${{vars.node-options}}"
      # Mirror upstream release process: build workspaces then bundle
      # npm run build builds all workspaces; we only need CLI deps
      npm run generate
      npm run build --workspace=packages/test-utils
      npm run build --workspace=packages/core
      npm run build --workspace=packages/web-templates
      npm run build --workspace=packages/cli
      # Bundle CLI for distribution (same as release workflow)
      npm run bundle

  - runs: |
      # Install code to /usr/lib/qwen-code
      mkdir -p ${{targets.contextdir}}/usr/lib/qwen-code
      cp -a dist/* ${{targets.contextdir}}/usr/lib/qwen-code/

      # Create wrapper script in /usr/bin
      mkdir -p ${{targets.contextdir}}/usr/bin
      cat > ${{targets.contextdir}}/usr/bin/qwen << 'EOF'
      #!/bin/sh
      exec node /usr/lib/qwen-code/cli.js "$@"
      EOF
      chmod 755 ${{targets.contextdir}}/usr/bin/qwen

  # Skip strip - dist contains JS files and vendor binaries that can't be stripped

subpackages:
  - name: qwen-code-doc
    description: Qwen Code documentation
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - busybox
        - nodejs-${{vars.node-version}}
  pipeline:
    - name: Verify qwen binary exists
      runs: |
        stat /usr/bin/qwen
    - name: Verify qwen is executable
      runs: |
        test -x /usr/bin/qwen
    - name: Check qwen version
      runs: |
        qwen --version
