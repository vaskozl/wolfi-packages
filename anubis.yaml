# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
# Generated from https://raw.githubusercontent.com/alpinelinux/aports/refs/heads/master/testing/anubis/APKBUILD
package:
  name: anubis
  version: "1.26.0"
  epoch: 0 # use test/ver-check
  description: Block AI scrapers using a sha256 proof-of-work challenge
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - brotli
      - build-base
      - busybox
      - ca-certificates-bundle
      - esbuild
      - go-1.26
      - nodejs
      - npm
      - zstd
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/TecharoHQ/anubis
      tag: v${{package.version}}
  - uses: autoconf/make
    with:
      opts: assets
  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./cmd/anubis
      output: anubis
      tags: limitedsupportability
test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          anubis
update:
  enabled: true
  github:
    identifier: TecharoHQ/anubis
    strip-prefix: v
