package:
  name: cagebreak
  version: "3.2.0"
  epoch: 4 # add explicit libwlroots soname dep (melange SCA misses it)
  description: Wayland tiling compositor inspired by Ratpoison
  copyright:
    - license: MIT
  dependencies:
    runtime:
      # melange SCA misses the libwlroots-0.X.so soname dep — its detector
      # only emits so: deps for names containing ".so.", and wlroots embeds
      # the major version into the basename (libwlroots-0.20.so) instead of
      # using a trailing .so.X suffix. Pin the soname manually so apk refuses
      # to install us against an incompatible wlroots ABI. Update this when
      # wlroots bumps to a new major version (e.g. 0.21).
      - so:libwlroots-0.20.so
environment:
  contents:
    packages:
      - build-base
      - libevdev-dev
      - libinput-dev
      - meson
      - pango-dev
      - scdoc
      - wayland-protocols
      - wayland-protocols-dev
      - wlroots
      - wlroots-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/project-repo/cagebreak
      tag: ${{package.version}}
  - runs: |
      sed -i 's/fanalyzer/fanalyzer_disabled/' meson.build
      meson \
        -Dman-pages=true \
        --prefix=/usr \
        . output
  - uses: meson/compile
  - uses: meson/install
  - runs: |
      install -Dm0644 examples/config "${{targets.destdir}}/usr/share/cagebreak/example-config"
  - uses: strip
subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: cagebreak manpages
test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          cagebreak
        flag: "-v"
    - uses: test/help-check
      with:
        bins: |
          cagebreak
        flag: "-h"
