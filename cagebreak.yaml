package:
  name: cagebreak
  version: "3.2.0"
  epoch: 7 # rebuild for wlroots 0.20.1
  description: Wayland tiling compositor inspired by Ratpoison
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - wlroots
environment:
  contents:
    packages:
      - build-base
      - libevdev-dev
      - libinput-dev
      - meson
      - pango-dev
      - scdoc
      - wayland-protocols
      - wayland-protocols-dev
      - wlroots
      - wlroots-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/project-repo/cagebreak
      tag: ${{package.version}}
  - runs: |
      sed -i 's/fanalyzer/fanalyzer_disabled/' meson.build
      meson \
        -Dman-pages=true \
        --prefix=/usr \
        . output
  - uses: meson/compile
  - uses: meson/install
  - runs: |
      install -Dm0644 examples/config "${{targets.destdir}}/usr/share/cagebreak/example-config"
  - uses: strip
subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: cagebreak manpages
test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          cagebreak
        flag: "-v"
    - uses: test/help-check
      with:
        bins: |
          cagebreak
        flag: "-h"
update:
  enabled: true
  github:
    identifier: project-repo/cagebreak
    use-tag: true
