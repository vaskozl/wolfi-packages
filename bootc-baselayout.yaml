package:
  name: bootc-baselayout
  version: 20251208
  epoch: 1 # add functional test
  description: Base directories needed by bootc
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - busybox
pipeline:
  - runs: |
        mkdir -p "${{targets.destdir}}"/sysroot
        mkdir -p "${{targets.destdir}}"/boot
test:
  pipeline:
    - runs: |
        set -eu
        # Verify base directories shipped by the package exist
        test -d /sysroot
        test -d /boot
