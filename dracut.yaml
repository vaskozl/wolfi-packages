package:
  name: dracut
  version: "111"
  epoch: 0 # tighten test pipeline
  description: Initramfs generator using udev
  copyright:
    - license: GPL-2.0-or-later AND LGPL-2.1-or-later AND GPL-2.0-only
  dependencies:
    runtime:
      - coreutils
      - cpio
      - udev
environment:
  contents:
    packages:
      - bash
      - build-base
      - coreutils
      - kmod-dev
      - pkgconf-dev
      - rust
      - systemd-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dracut-ng/dracut-ng.git
      tag: ${{package.version}}
  - uses: autoconf/configure
    with:
      opts: |
        --sysconfdir=/etc \
        --prefix=/usr \
        --libdir=/usr/lib \
        --systemdsystemunitdir=/usr/lib/systemd \
        --enable-dracut-cpio
  - uses: autoconf/make-install
    with:
      opts: |
        enable_documentation=no
  - runs: |
      mkdir -p ${{targets.destdir}}/etc/dracut.conf.d
      install -Dm644 ./30-bootc.conf ${{targets.destdir}}/etc/dracut.conf.d/30-bootc.conf
  - uses: strip
subpackages:
  - name: dracut-dev
    description: Headers and dev libraries from Dracut
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/ldd-check
test:
  pipeline:
    - uses: test/ver-check
      with:
        bins: |
          dracut
    - uses: test/help-check
      with:
        bins: |
          dracut
          lsinitrd
    - name: dracut-catimages is present
      runs: |
        set -eu
        command -v dracut-catimages
update:
  enabled: true
  github:
    identifier: dracut-ng/dracut-ng
    use-tag: true
