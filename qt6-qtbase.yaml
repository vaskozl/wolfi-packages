# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: qt6-qtbase
  version: "6.10.2"
  epoch: 0
  description: A cross-platform application and UI framework
  copyright:
    - license: LGPL-3.0-only OR GPL-3.0-only
  dependencies:
    runtime:
      - tzdata
  resources:
    cpu: "16"
    memory: 32Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - ninja-build
      - samurai
      - perl
      - xmlstarlet
      - glibc-dev
      - libstdc++-dev
      # Build dependencies from Alpine APKBUILD
      - tzdata
      - at-spi2-core-dev
      - cups-dev
      - dbus-dev
      - double-conversion-dev
      - eudev-dev
      - fontconfig-dev
      - freetype-dev
      - glib-dev
      - harfbuzz-dev
      - icu-dev
      - libb2-dev
      - libinput-dev
      - libjpeg-turbo-dev
      - libpng-dev
      - libpq-dev
      - libproxy-dev
      - libxkbcommon-dev
      - mariadb-dev
      - mesa-dev
      - openssl-dev
      - pcre2-dev
      - sqlite-dev
      - tslib-dev
      - unixodbc-dev
      - vulkan-headers
      - vulkan-loader-dev
      - wayland-dev
      - xcb-util-cursor-dev
      - xcb-util-dev
      - xcb-util-image-dev
      - xcb-util-keysyms-dev
      - xcb-util-renderutil-dev
      - xcb-util-wm-dev
      - zlib-dev

pipeline:
  - uses: fetch
    with:
      uri: https://download.qt.io/official_releases/qt/6.10/6.10.2/submodules/qtbase-everywhere-src-6.10.2.tar.xz
      expected-sha256: aeb78d29291a2b5fd53cb55950f8f5065b4978c25fb1d77f627d695ab9adf21e

  - runs: |
      # -g1: significantly reduce debug symbol size
      export CFLAGS="$CFLAGS -g1"
      export CXXFLAGS="$CXXFLAGS -g1"
      cmake -B build -G Ninja -Wno-dev \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
        -DINSTALL_BINDIR=lib/qt6/bin \
        -DINSTALL_PUBLICBINDIR=bin \
        -DINSTALL_DOCDIR=share/doc/qt6 \
        -DINSTALL_ARCHDATADIR=lib/qt6 \
        -DINSTALL_DATADIR=share/qt6 \
        -DINSTALL_INCLUDEDIR=include/qt6 \
        -DINSTALL_MKSPECSDIR=lib/qt6/mkspecs \
        -DINSTALL_EXAMPLESDIR=share/doc/qt6/examples \
        -DQT_FEATURE_journald=OFF \
        -DFEATURE_libproxy=ON \
        -DQT_FEATURE_openssl_linked=ON \
        -DQT_FEATURE_reduce_relocations=OFF \
        -DQT_FEATURE_system_sqlite=ON \
        -DQT_FEATURE_system_xcb_xinput=ON \
        -DQT_FEATURE_vulkan=ON \
        -DQT_FEATURE_xcb=ON \
        -DQT_FEATURE_relocatable=OFF

  - runs: |
      cmake --build build

  - runs: |
      DESTDIR="${{targets.destdir}}" cmake --install build
      
      # Create symlinks for qt6 dev tools
      mkdir -p "${{targets.destdir}}/usr/bin"
      cd "${{targets.destdir}}"
      if [ -f build/user_facing_tool_links.txt ]; then
        while read -r target name; do
          ln -sv "$target" "$name" 2>/dev/null || true
        done < build/user_facing_tool_links.txt
      fi

  - uses: strip

subpackages:
  - name: qt6-qtbase-dev
    description: Qt6 base development files
    dependencies:
      runtime:
        - qt6-qtbase=${{package.full-version}}
        # Dependencies from Alpine
        - at-spi2-core-dev
        - cups-dev
        - dbus-dev
        - double-conversion-dev
        - eudev-dev
        - fontconfig-dev
        - freetype-dev
        - glib-dev
        - harfbuzz-dev
        - icu-dev
        - libb2-dev
        - libinput-dev
        - libjpeg-turbo-dev
        - libpng-dev
        - libpq-dev
        - libproxy-dev
        - libxkbcommon-dev
        - mariadb-dev
        - mesa-dev
        - openssl-dev
        - pcre2-dev
        - sqlite-dev
        - tslib-dev
        - unixodbc-dev
        - vulkan-headers
        - vulkan-loader-dev
        - wayland-dev
        - xcb-util-cursor-dev
        - xcb-util-dev
        - xcb-util-image-dev
        - xcb-util-keysyms-dev
        - xcb-util-renderutil-dev
        - xcb-util-wm-dev
        - zlib-dev
    pipeline:
      - uses: split/dev
      - runs: |
          # Move bin and qt6/bin to dev package
          mkdir -p "${{targets.destdir}}/usr/bin"
          mv "${{targets.destdir}}/usr/lib/qt6/bin" "${{targets.destdir}}/usr/bin" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/qt6/sbom" "${{targets.destdir}}/usr/lib/qt6/" 2>/dev/null || true
    test:
      pipeline:
        - runs: |
            test -f /usr/include/qt6/QtCore/qcoreapplication.h
            test -f /usr/include/qt6/QtGui/qguiapplication.h

  - name: qt6-qtbase-private-dev
    description: Qt6 base private development files (private API headers)
    dependencies:
      runtime:
        - qt6-qtbase-dev=${{package.full-version}}
    pipeline:
      - runs: |
          # Extract private headers and cmake files
          # Private headers are in /usr/include/qt6/<Module>/<ver>/<Module>/private/
          mkdir -p "${{targets.destdir}}/usr/include/qt6"
          find "${{targets.destdir}}/usr/include/qt6" -type d -name private -exec cp -a {} "${{targets.destdir}}/usr/include/qt6/" \; 2>/dev/null || true
          
          # Move cmake Private files
          mkdir -p "${{targets.destdir}}/usr/lib/cmake"
          find "${{targets.destdir}}/usr/lib/cmake" -name "*Private*" -exec cp -a {} "${{targets.destdir}}/usr/lib/cmake/" \; 2>/dev/null || true
          
          # Move qt6 modules Private JSON files
          mkdir -p "${{targets.destdir}}/usr/lib/qt6/modules"
          find "${{targets.destdir}}/usr/lib/qt6/modules" -name "*Private.json" -exec cp -a {} "${{targets.destdir}}/usr/lib/qt6/modules/" \; 2>/dev/null || true
    test:
      pipeline:
        - name: Verify private headers exist
          runs: |
            test -d /usr/include/qt6/QtCore/private || (echo "QtCore private headers not found" && exit 1)
            test -d /usr/include/qt6/QtGui/private || (echo "QtGui private headers not found" && exit 1)
            test -f /usr/lib/cmake/Qt6CorePrivate/Qt6CorePrivateConfig.cmake || (echo "CorePrivate cmake not found" && exit 1)
            test -f /usr/lib/cmake/Qt6GuiPrivate/Qt6GuiPrivateConfig.cmake || (echo "GuiPrivate cmake not found" && exit 1)

  - name: qt6-qtbase-doc
    description: Qt6 base documentation
    pipeline:
      - uses: split/manpages

  - name: qt6-qtbase-x11
    description: Qt6 X11-related libraries
    dependencies:
      runtime:
        - qt6-qtbase=${{package.full-version}}
        - hicolor-icon-theme
        - xdg-utils
    pipeline:
      - runs: |
          # Move X11-related libraries and plugins
          mkdir -p "${{targets.destdir}}/usr/lib"
          mkdir -p "${{targets.destdir}}/usr/lib/qt6/plugins"
          
          mv "${{targets.destdir}}/usr/lib/libQt6EglFSDeviceIntegration.so"* "${{targets.destdir}}/usr/lib/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/libQt6EglFsKms*Support.so"* "${{targets.destdir}}/usr/lib/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/libQt6Gui.so"* "${{targets.destdir}}/usr/lib/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/libQt6OpenGL*.so"* "${{targets.destdir}}/usr/lib/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/libQt6XcbQpa.so"* "${{targets.destdir}}/usr/lib/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/libQt6PrintSupport.so"* "${{targets.destdir}}/usr/lib/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/libQt6Widgets.so"* "${{targets.destdir}}/usr/lib/" 2>/dev/null || true
          
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/egldeviceintegrations" "${{targets.destdir}}/usr/lib/qt6/plugins/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/generic" "${{targets.destdir}}/usr/lib/qt6/plugins/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/image"* "${{targets.destdir}}/usr/lib/qt6/plugins/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/platform"* "${{targets.destdir}}/usr/lib/qt6/plugins/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/printsupport"* "${{targets.destdir}}/usr/lib/qt6/plugins/" 2>/dev/null || true

  - name: qt6-qtbase-wayland
    description: Qt6 Wayland-related libraries
    dependencies:
      runtime:
        - qt6-qtbase=${{package.full-version}}
    pipeline:
      - runs: |
          # Move Wayland-related libraries
          mkdir -p "${{targets.destdir}}/usr/lib"
          mkdir -p "${{targets.destdir}}/usr/lib/qt6/plugins"
          mkdir -p "${{targets.destdir}}/usr/lib/qt6/libexec"
          mkdir -p "${{targets.destdir}}/usr/share/qt6"
          
          mv "${{targets.destdir}}/usr/lib/libQt6WaylandClient.so"* "${{targets.destdir}}/usr/lib/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/libQt6WlShellIntegration.so"* "${{targets.destdir}}/usr/lib/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/wayland"* "${{targets.destdir}}/usr/lib/qt6/plugins/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/lib/qt6/libexec/qtwaylandscanner" "${{targets.destdir}}/usr/lib/qt6/libexec/" 2>/dev/null || true
          mv "${{targets.destdir}}/usr/share/qt6/wayland" "${{targets.destdir}}/usr/share/qt6/" 2>/dev/null || true

  - name: qt6-qtbase-sqlite
    description: SQLite driver for Qt6's SQL classes
    dependencies:
      runtime:
        - qt6-qtbase=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers"
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers/libqsqlite"* "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers/" 2>/dev/null || true

  - name: qt6-qtbase-odbc
    description: ODBC driver for Qt6's SQL classes
    dependencies:
      runtime:
        - qt6-qtbase=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers"
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers/libqsqlodbc"* "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers/" 2>/dev/null || true

  - name: qt6-qtbase-postgresql
    description: PostgreSQL driver for Qt6's SQL classes
    dependencies:
      runtime:
        - qt6-qtbase=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers"
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers/libqsqlpsql"* "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers/" 2>/dev/null || true

  - name: qt6-qtbase-mysql
    description: MySQL driver for Qt6's SQL classes
    dependencies:
      runtime:
        - qt6-qtbase=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers"
          mv "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers/libqsqlmysql"* "${{targets.destdir}}/usr/lib/qt6/plugins/sqldrivers/" 2>/dev/null || true

test:
  environment:
    contents:
      packages:
        - busybox
  pipeline:
    - name: Verify Qt6 base libraries exist
      runs: |
        test -f /usr/lib/libQt6Core.so || (echo "libQt6Core.so not found" && exit 1)
        test -f /usr/lib/libQt6Gui.so || (echo "libQt6Gui.so not found" && exit 1)
        test -f /usr/lib/libQt6Widgets.so || (echo "libQt6Widgets.so not found" && exit 1)
