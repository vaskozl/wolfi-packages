# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: systemd-user-enable-all-preset
  version: "1"
  epoch: 0
  description: systemd user preset enabling all user units by default
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - systemd
environment:
  contents:
    packages:
      - busybox
pipeline:
  - runs: |
      mkdir -p "${{targets.destdir}}/usr/lib/systemd/user-preset"
      printf 'enable *\n' \
        > "${{targets.destdir}}/usr/lib/systemd/user-preset/99-enable-all.preset"
test:
  pipeline:
    - runs: |
        set -eu
        stat /usr/lib/systemd/user-preset/99-enable-all.preset
        grep -F 'enable *' /usr/lib/systemd/user-preset/99-enable-all.preset
