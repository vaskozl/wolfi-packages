# yaml-language-server: $schema=https://raw.githubusercontent.com/wolfi-dev/melange/main/pkg/config/melange.schema.json
# Generated from https://raw.githubusercontent.com/alpinelinux/aports/refs/heads/master/main/perl-mailtools/APKBUILD
package:
  name: perl-mailtools
  version: "2.22"
  epoch: 1 # pure-Perl env trim + functional test
  description: Various ancient e-mail related modules
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
environment:
  contents:
    packages:
      - busybox
      - perl
      - perl-timedate
pipeline:
  - uses: fetch
    with:
      expected-sha256: 3bf68bb212298fa699a52749dddff35583a74f36a92ca89c843b854f29d87c77
      uri: https://cpan.metacpan.org/authors/id/M/MA/MARKOV/MailTools-${{package.version}}.tar.gz
  - uses: perl/make
  - uses: autoconf/make
  - uses: autoconf/make-install
  - uses: perl/cleanup
  - uses: strip
subpackages:
  - name: perl-mailtools-doc
    pipeline:
      - uses: split/manpages
    description: perl-mailtools manpages
    test:
      pipeline:
        - uses: test/docs
test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: |
          Mail::Address
          Mail::Header
          Mail::Internet
          Mail::Util
    - name: Verify Mail::Address parses an RFC 822 address
      runs: |
        set -eu
        out=$(perl -MMail::Address -e '
          my ($a) = Mail::Address->parse("Foo Bar <foo@example.com>");
          print $a->address, "|", $a->name;
        ')
        echo "$out"
        echo "$out" | grep -qF 'foo@example.com|Foo Bar'
