package:
  name: qbittorrent-nox
  version: "5.1.4"
  epoch: 1 # functional tests
  description: qBittorrent BitTorrent client (headless/webui only)
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - libgcc
      - libstdc++
      - libtorrent-rasterbar
      - openssl
      - qt6-qtbase
      - qt6-qttools
      - zlib
  resources:
    cpu: "8"
    memory: 16Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - libtorrent-rasterbar-dev
      - openssl-dev
      - qt6-qtbase-dev
      - qt6-qttools-dev
      - samurai
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/qbittorrent/qBittorrent
      tag: release-${{package.version}}

  - runs: |
      cmake -B build \
        -DCMAKE_BUILD_TYPE=Release \
        -DGUI=OFF \
        -DSTACKTRACE=OFF \
        -DTESTING=OFF \
        -DCMAKE_INSTALL_PREFIX=/usr
      cmake --build build
      cmake --install build --destdir "${{targets.destdir}}"

  - runs: |
      # Install systemd service
      install -Dm644 dist/systemd/qbittorrent-nox.service "${{targets.destdir}}"/usr/lib/systemd/system/qbittorrent-nox.service

  - uses: strip

test:
  pipeline:
    - name: Version check
      runs: |
        set -eu
        qbittorrent-nox --version
    - name: Help check
      runs: |
        set -eu
        qbittorrent-nox --help
