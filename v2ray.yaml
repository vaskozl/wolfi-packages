# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: v2ray
  version: "5.20.0"
  epoch: 0
  description: A platform for building proxies to bypass network restrictions
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ca-certificates
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/v2fly/v2ray-core
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./...
      output: v2ray
      ldflags: |
        -X github.com/v2fly/v2ray-core/v5.build=${{package.version}}
        -X github.com/v2fly/v2ray-core/v5.codename=V2Ray
        -X github.com/v2fly/v2ray-core/v5.version=${{package.version}}

  - runs: |
      # Install binary
      install -Dm755 v2ray "${{targets.destdir}}"/usr/bin/v2ray

      # Install geodata files if they exist
      if [ -f geoip.dat ]; then
        install -Dm644 geoip.dat "${{targets.destdir}}"/usr/share/v2ray/geoip.dat
      fi
      if [ -f geosite.dat ]; then
        install -Dm644 geosite.dat "${{targets.destdir}}"/usr/share/v2ray/geosite.dat
      fi

      # Create config directory
      mkdir -p "${{targets.destdir}}"/etc/v2ray

      # Create data directory
      mkdir -p "${{targets.destdir}}"/var/lib/v2ray

  - uses: strip

subpackages:
  - name: v2ray-doc
    description: v2ray documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - busybox
  pipeline:
    - name: Verify v2ray binary exists
      runs: |
        stat /usr/bin/v2ray
    - name: Verify v2ray is executable
      runs: |
        test -x /usr/bin/v2ray
    - name: Check v2ray version
      runs: |
        v2ray version 2>&1 || true
    - name: Check v2ray help
      runs: |
        v2ray --help 2>&1 | head -10
