# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: mesa-full
  version: "26.1.4"
  epoch: 0
  description: Mesa DRI OpenGL/Vulkan, single unsplit package with Intel drivers (x86_64)
  copyright:
    - license: MIT AND SGI-B-2.0 AND BSL-1.0
  target-architecture:
    - x86_64
  dependencies:
    provider-priority: "10"
    provides:
      - mesa=${{package.full-version}}
    runtime:
      - libglvnd
      - spirv-tools
vars:
  llvm-ver: 19
  py-version: "3.13"
environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - clang-${{vars.llvm-ver}}
      - elfutils-dev
      - expat-dev
      - findutils
      - flex
      - gettext
      - glslang-dev
      - libclang-cpp-${{vars.llvm-ver}}
      - libclc
      - libdrm-dev
      - libglvnd-dev
      - libtool
      - libva
      - libva-dev
      - libvdpau-dev
      - libx11-dev
      - libxcb-dev
      - libxext-dev
      - libxfixes-dev
      - libxml2-dev
      - libxrandr
      - libxrandr-dev
      - libxrender
      - libxrender-dev
      - libxshmfence-dev
      - libxxf86vm-dev
      - llvm-${{vars.llvm-ver}}
      - llvm-${{vars.llvm-ver}}-dev
      - meson
      - py${{vars.py-version}}-mako
      - py${{vars.py-version}}-markupsafe
      - py${{vars.py-version}}-pygments
      - py${{vars.py-version}}-pyyaml
      - py${{vars.py-version}}-setuptools
      - python-${{vars.py-version}}
      # Pin to the 19.1 stream: mesa requires LLVMSPIRVLib < 19.2
      - spirv-llvm-translator-dev<19.2
      - spirv-tools-dev
      - systemd-dev
      - vulkan-loader
      - wayland-dev
      - wayland-protocols
      - wayland-protocols-dev
      - xorgproto
      - zlib-dev
      - zstd-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/mesa/mesa
      tag: mesa-${{package.version}}
  - runs: |
      export CFLAGS="$CFLAGS -O2 -g1"
      export CXXFLAGS="$CXXFLAGS -O2 -g1"
      export CPPFLAGS="$CPPFLAGS -O2 -g1"

      _dri_driverdir=/usr/lib/xorg/modules/dri
      _gallium_drivers="r300,r600,radeonsi,nouveau,llvmpipe,virgl,zink,svga,i915,iris,crocus"
      _vulkan_drivers="amd,swrast,intel,intel_hasvk,virtio"
      _vulkan_layers="device-select,overlay,intel-nullhw"

      meson \
        --prefix=/usr \
        -Ddri-drivers-path=$_dri_driverdir \
        -Dgallium-drivers=$_gallium_drivers \
        -Dvulkan-drivers=$_vulkan_drivers \
        -Dvulkan-layers=$_vulkan_layers \
        -Dplatforms=x11,wayland \
        -Dllvm=enabled \
        -Dglvnd=true \
        -Dshared-llvm=enabled \
        -Dshared-glapi=enabled \
        -Dgbm=enabled \
        -Dglx=dri \
        -Dopengl=true \
        -Dgles1=enabled \
        -Dgles2=enabled \
        -Degl=enabled \
        -Dgallium-extra-hud=true \
        -Dgallium-va=enabled \
        -Damdgpu-virtio=true \
        -Dallow-kcmp=enabled \
        -Dexpat=enabled \
        -Dxmlconfig=enabled \
        -Dxlib-lease=enabled \
        -Dshader-cache=enabled \
        -Dzstd=enabled \
        -Dvideo-codecs=all \
        -Dbackend_max_links=2 \
        -Db_ndebug=true \
        -Db_lto=false \
        . output

      meson configure --no-pager output
      meson compile -C output

      DESTDIR="${{targets.destdir}}" meson install --no-rebuild -C output
  - uses: strip
data:
  - name: libs
    items:
      egl: libEGL_mesa
      glx: libGLX_mesa
      gbm: libgbm
      libgallium: libgallium-${{package.version}}
  - name: transitive
    items:
      gl: ""
      gles: ""
subpackages:
  # Runtime lib subpackages mirroring Wolfi's mesa.yaml matrix layout. Each
  # provides the Wolfi virtual name at priority 10 so it wins over Wolfi's
  # same-named package despite our older version. Listed BEFORE -dev so their
  # mv claims the unversioned .so dev symlinks (notably libgbm.so) before
  # split/dev runs.
  - range: libs
    name: ${{package.name}}-${{range.key}}
    description: mesa ${{range.key}} (drop-in for Wolfi mesa-${{range.key}})
    dependencies:
      provider-priority: "10"
      provides:
        - mesa-${{range.key}}=${{package.full-version}}
      runtime:
        - libglvnd
        - mesa-libgallium=${{package.full-version}}
        - spirv-tools
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/lib"
          mv "${{targets.destdir}}/usr/lib/${{range.value}}.so"* "${{targets.subpkgdir}}/usr/lib/"
    test:
      pipeline:
        - uses: test/ldd-check
          with:
            packages: ${{package.name}}-${{range.key}}
  - range: transitive
    name: ${{package.name}}-${{range.key}}
    description: mesa transitive package for ${{range.key}} (drop-in for Wolfi mesa-${{range.key}})
    dependencies:
      provider-priority: "10"
      provides:
        - mesa-${{range.key}}=${{package.full-version}}
      runtime:
        - ${{package.name}}=${{package.full-version}}
        - mesa-glx=${{package.full-version}}
    pipeline:
  - name: ${{package.name}}-dev
    description: ${{package.name}} development headers and libraries
    pipeline:
      - uses: split/dev
    dependencies:
      # Provide mesa-dev (so it can't be co-installed with Wolfi's mesa-dev and
      # the set stays coherent) but NOT at raised priority: mesa headers are
      # driver-agnostic, so trumping Wolfi's mesa-dev gives builds nothing while
      # dragging the fat runtime into build envs. Let Wolfi's lean mesa-dev win.
      provides:
        - mesa-dev=${{package.full-version}}
      runtime:
        - libglvnd-dev
        - ${{package.name}}=${{package.full-version}}
    test:
      pipeline:
        - uses: test/pkgconf
test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
    - name: GPU drivers present
      runs: |
        set -eu
        # Software rasterizer Vulkan ICD.
        test -e /usr/share/vulkan/icd.d/lvp_icd.*.json
        # Intel Gallium (Iris Xe / 13th gen) + ANV/HASVK Vulkan ICDs.
        test -e /usr/lib/xorg/modules/dri/iris_dri.so
        test -e /usr/lib/libvulkan_intel.so
        test -e /usr/share/vulkan/icd.d/intel_icd.x86_64.json
        test -e /usr/lib/libvulkan_intel_hasvk.so
        test -e /usr/share/vulkan/icd.d/intel_hasvk_icd.x86_64.json
update:
  enabled: true
  ignore-regex-patterns:
    - "_"
    - "-"
  git:
    strip-prefix: mesa-
    tag-filter-prefix: mesa-
