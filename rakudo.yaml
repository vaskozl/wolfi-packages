# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: rakudo
  version: "2026.04"
  epoch: 2 # drop busybox from test env (implicit), fix test anti-patterns
  description: Rakudo is a compiler for the Raku programming language
  copyright:
    - license: Artistic-2.0
  dependencies:
    runtime:
      - moarvm~${{package.version}}
      - nqp~${{package.version}}
  resources:
    cpu: "4"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - moarvm~${{package.version}}
      - moarvm-dev~${{package.version}}
      - nqp~${{package.version}}
      - perl
      - perl-utils

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rakudo/rakudo
      tag: ${{package.version}}

  - runs: |
      perl Configure.pl \
        --prefix=/usr \
        --backends=moar \
        --rakudo-home=/usr/share/rakudo

  - runs: make

  - runs: make DESTDIR="${{targets.destdir}}" install

  - uses: strip

subpackages:
  - name: rakudo-dev
    pipeline:
      - uses: split/dev
    description: rakudo development files

  - name: rakudo-doc
    pipeline:
      - uses: split/manpages
    description: rakudo documentation

test:
  pipeline:
    - name: Verify raku binary
      runs: |
        set -eu
        raku --version
    - name: Test basic Raku execution
      runs: |
        set -eu
        raku -e 'say "Hello, Raku!"'
