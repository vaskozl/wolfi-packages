# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: linux-firmware-i915
  # datasource: alpine-base packageName: linux-firmware-i915
  version: 20260519
  epoch: 0
  description: Repackaged Alpine Intel i915 GPU firmware blobs (GuC/HuC/DMC)
  copyright:
    - license: GPL-2.0-or-later
environment:
  contents:
    packages:
      - busybox
      - wget
      - wolfi-base
pipeline:
  - runs: |
      set -eux
      mkdir alpinepkg
      cd alpinepkg
      branch="edge"
      repo="main"
      variant="linux-firmware-i915"

      wget "https://dl-cdn.alpinelinux.org/alpine/${branch}/${repo}/${{build.arch}}/${variant}-${{package.version}}-r0.apk"

      for f in *.apk; do
        tar -xzf "$f"
      done
  - runs: |
      set -eux
      out="${{targets.destdir}}"
      install -d "$out/usr/lib/firmware"
      cp -a alpinepkg/lib/firmware/i915 "$out/usr/lib/firmware/"
test:
  pipeline:
    - runs: |
        set -eu
        test -d /usr/lib/firmware/i915
        # Tiger Lake / Alder Lake GuC microcode — required for Gen12 hwaccel
        ls /usr/lib/firmware/i915/tgl_guc_*.bin.zst >/dev/null
        ls /usr/lib/firmware/i915/adlp_guc_*.bin.zst >/dev/null
