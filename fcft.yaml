package:
  name: fcft
  version: "3.3.3"
  epoch: 1 # add tests, alphabetize env
  description: Simple library for font loading and glyph rasterization using FontConfig, FreeType and pixman
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - build-base
      - fontconfig-dev
      - freetype-dev
      - harfbuzz-dev
      - meson
      - pixman-dev
      - scdoc
      - tllist-dev
      - utf8proc-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/dnkl/fcft
      tag: ${{package.version}}
  - runs: |
      ln -s /usr/bin/scdoc /usr/local/bin/scdoc
  - uses: meson/configure
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: "${{package.name}}-doc"
    pipeline:
      - uses: split/alldocs
    description: fcft manpages
    test:
      pipeline:
        - uses: test/docs
  - name: "${{package.name}}-dev"
    pipeline:
      - uses: split/dev
    description: fcft dev
test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
