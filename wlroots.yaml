package:
  name: wlroots
  version: "0.20.0"
  epoch: 1 # alphabetize env, add tests
  description: Modular Wayland compositor library
  copyright:
    - license: MIT
environment:
  contents:
    packages:
      - build-base
      - glslang-dev
      - hwdata-dev
      - hwdata-pnp
      - lcms2-dev
      - libcap-dev
      - libdisplay-info-dev
      - libinput-dev
      - libliftoff-dev
      - libseat-dev
      - libsystemd
      - libxcb-dev
      - libxkbcommon-dev
      - mesa-dev
      - mesa-gbm
      - meson
      - ninja-build
      - pixman-dev
      - samurai
      - systemd-dev
      - vulkan-headers
      - vulkan-loader
      - wayland-dev
      - wayland-protocols
      - wayland-protocols-dev
      - xcb-util-image-dev
      - xcb-util-renderutil-dev
      - xcb-util-wm-dev
      - xkeyboard-config-dev
pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/wlroots/wlroots
      tag: ${{package.version}}
  - runs: |
      meson \
        -Db_lto=true \
        -Dexamples=false \
        -Dcolor-management=enabled \
        -Ddefault_library=both \
        -Dsession=enabled \
        --prefix=/usr \
        . output
  - uses: meson/compile
  - uses: meson/install
  - uses: strip
subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    description: ${{package.name}} dev
    dependencies:
      runtime:
        - wlroots
    test:
      pipeline:
        - runs: |
            set -eu
            stat /usr/include/wlr/render/wlr_renderer.h
test:
  pipeline:
    - uses: test/ldd-check
      with:
        packages: ${{package.name}}
