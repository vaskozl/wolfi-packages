# yaml-language-server: $schema=https://raw.githubusercontent.com/wolfi-dev/melange/main/pkg/config/melange.schema.json
# Generated from https://raw.githubusercontent.com/alpinelinux/aports/refs/heads/master/main/perl-timedate/APKBUILD
package:
  name: perl-timedate
  version: "2.33"
  epoch: 1 # pure-Perl env trim + functional test
  description: Perl module for TimeDate
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
environment:
  contents:
    packages:
      - busybox
      - perl
pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/A/AT/ATOOMIC/TimeDate-${{package.version}}.tar.gz
      expected-sha256: "c0b69c4b039de6f501b0d9f13ec58c86b040c1f7e9b27ef249651c143d605eb2"
  - uses: perl/make
  - uses: autoconf/make
  - uses: autoconf/make-install
  - uses: perl/cleanup
  - uses: strip
subpackages:
  - name: perl-timedate-doc
    pipeline:
      - uses: split/manpages
    description: perl-timedate manpages
    test:
      pipeline:
        - uses: test/docs
test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: "Date::Parse Date::Format"
    - name: Verify Date::Parse and Date::Format roundtrip a known epoch
      runs: |
        set -eu
        out=$(perl -MDate::Parse -MDate::Format -e \
          'print time2str("%Y-%m-%dT%H:%M:%SZ", str2time("1970-01-01T00:00:00Z"), "UTC")')
        echo "$out"
        echo "$out" | grep -Fq '1970-01-01T00:00:00Z'
