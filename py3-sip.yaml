package:
  name: py3-sip
  version: "6.10.0"
  epoch: 0
  description: A tool that makes it easy to create Python bindings for C and C++ libraries
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - python3
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - python3
      - python3-dev
      - py3-installer
      - py3-wheel
      - py3-build
      - py3-poetry-core

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/PyQtClub/sip
      tag: ${{package.version}}

  - runs: |
      python3 -m installer --destdir="${{targets.destdir}}" \
        $(python3 -m build --wheel)

  - uses: strip

subpackages:
  - name: py3-sip-dev
    description: SIP Python bindings generator (development files)
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - runs: |
            test -f /usr/include/sip.h

test:
  environment:
    contents:
      packages:
        - busybox
        - python3
  pipeline:
    - name: Verify sip module exists
      runs: |
        python3 -c "import sip; print('sip module loaded successfully')"
    - name: Verify sip binary exists
      runs: |
        test -x /usr/bin/sip
