# yaml-language-server: $schema=https://raw.githubusercontent.com/chainguard-dev/melange/refs/heads/main/pkg/config/schema.json
package:
  name: wolfi-scanner
  version: 0.0.4
  epoch: 1 # pin go-1.26, add go-package, drop build-base, fix test
  description: In cluster wolfi scanner.
  copyright:
    - license: Apache-2.0
environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/vaskozl/wolfi-scanner
      tag: ${{package.version}}
  - uses: go/build
    with:
      go-package: go-1.26
      packages: .
      output: wolfi-scanner
  - uses: strip
test:
  pipeline:
    - uses: test/help-check
      with:
        bins: |
          wolfi-scanner
